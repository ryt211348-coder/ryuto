<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNSリサーチツール - 食品 & 美容</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:linear-gradient(135deg,#0d1117,#161b22);border-bottom:1px solid #30363d}
.logo{font-size:20px;font-weight:700;color:#58a6ff}
.logo-sub{font-size:12px;color:#8b949e;margin-left:12px}
.control-bar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:12px 24px;background:#0d1117;border-bottom:1px solid #21262d}
.control-group{display:flex;align-items:center;gap:8px}
.control-group label{font-size:12px;color:#8b949e;white-space:nowrap}
.toggle-group{display:flex;gap:2px;background:#161b22;border-radius:8px;padding:2px}
.toggle-btn{padding:5px 12px;border:none;background:transparent;color:#8b949e;font-size:12px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toggle-btn.active{background:#1f6feb;color:#fff}
.toggle-btn:hover:not(.active){color:#c9d1d9;background:#21262d}
.breadcrumb{display:flex;align-items:center;gap:4px;padding:8px 24px;font-size:13px;color:#8b949e;background:#0d1117}
.crumb{cursor:pointer;padding:2px 8px;border-radius:4px;transition:all .2s}
.crumb:hover{color:#58a6ff;background:#161b22}
.crumb.active{color:#e0e0e0;font-weight:600}
.crumb-sep{color:#30363d;margin:0 2px}
.main-content{position:relative;height:calc(100vh - 140px);overflow:hidden}
.mindmap-area,.videos-area,.accounts-area{width:100%;height:100%;overflow-y:auto;position:absolute;top:0;left:0}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:#8b949e}
.spinner{width:40px;height:40px;margin-bottom:12px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:24px}
.node-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;cursor:pointer;transition:all .3s ease;position:relative;display:flex;flex-direction:column;gap:8px;min-width:160px}
.node-card:hover{border-color:#58a6ff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(88,166,255,.15)}
.node-card.food{border-left:3px solid #f0883e}
.node-card.beauty{border-left:3px solid #f778ba}
.node-badge{position:absolute;top:8px;right:8px;font-size:10px;padding:2px 6px;border-radius:10px;background:#21262d;color:#8b949e}
.node-name{font-size:14px;font-weight:600;color:#e0e0e0}
.node-volume{font-size:22px;font-weight:700}
.node-volume.high{color:#3fb950}
.node-volume.mid{color:#d29922}
.node-volume.low{color:#8b949e}
.node-children-hint{font-size:11px;color:#58a6ff}
.node-bar{height:4px;background:#21262d;border-radius:2px;margin-top:4px}
.node-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.node-bar-fill.food{background:linear-gradient(90deg,#f0883e,#ffa657)}
.node-bar-fill.beauty{background:linear-gradient(90deg,#f778ba,#ff9bce)}
.videos-header,.accounts-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#0a0a1a;z-index:10}
.videos-header h2,.accounts-header h2{font-size:16px;color:#e0e0e0}
.sort-control select{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:6px;font-size:12px}
.videos-grid,.accounts-grid{padding:16px 24px;display:flex;flex-direction:column;gap:8px}
.video-card{display:grid;grid-template-columns:60px 1fr auto;gap:12px;align-items:center;padding:12px 16px;background:#161b22;border:1px solid #21262d;border-radius:8px;cursor:pointer;transition:all .2s}
.video-card:hover{border-color:#30363d;background:#1c2129}
.video-rank{font-size:24px;font-weight:700;color:#30363d;text-align:center}
.video-rank.top3{color:#ffa657}
.video-info{display:flex;flex-direction:column;gap:4px}
.video-title{font-size:13px;font-weight:600;color:#e0e0e0}
.video-meta{font-size:11px;color:#8b949e;display:flex;gap:12px;flex-wrap:wrap}
.video-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.video-views{font-size:16px;font-weight:700;color:#3fb950}
.video-engagement{font-size:11px;color:#d29922}
.platform-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.platform-badge.tiktok{background:#1a1a2e;color:#69c9d0}
.platform-badge.instagram{background:#2a1a2e;color:#e1306c}
.account-card{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:12px 16px;background:#161b22;border:1px solid #21262d;border-radius:8px;cursor:pointer;transition:all .2s}
.account-card:hover{border-color:#30363d;background:#1c2129}
.account-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1f6feb,#58a6ff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.account-info{display:flex;flex-direction:column;gap:2px}
.account-name{font-size:14px;font-weight:600;color:#e0e0e0}
.account-handle{font-size:12px;color:#8b949e}
.account-meta{font-size:11px;color:#8b949e;display:flex;gap:12px}
.account-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.account-followers{font-size:14px;font-weight:700;color:#c9d1d9}
.account-growth{font-size:13px;font-weight:600}
.account-growth.positive{color:#3fb950}
.account-growth.negative{color:#f85149}
.side-panel{width:380px;background:#0d1117;border-left:1px solid #21262d;display:flex;flex-direction:column;overflow-y:auto;position:fixed;right:0;top:0;bottom:0;z-index:100;box-shadow:-4px 0 24px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .3s ease}
.side-panel.open{transform:translateX(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#0d1117;z-index:5}
.panel-header h3{font-size:15px;color:#e0e0e0}
.panel-close{background:none;border:none;color:#8b949e;font-size:24px;cursor:pointer;padding:0 4px;line-height:1}
.panel-close:hover{color:#f85149}
.panel-body{padding:16px;flex:1}
.panel-section{margin-bottom:20px}
.panel-section-title{font-size:12px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.panel-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #161b22;font-size:13px}
.panel-stat-label{color:#8b949e}
.panel-stat-value{color:#e0e0e0;font-weight:600}
.panel-tags{display:flex;flex-wrap:wrap;gap:4px}
.panel-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
@media(max-width:768px){.control-bar{padding:8px 12px;gap:8px}.toggle-btn{padding:4px 8px;font-size:11px}.nodes-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));padding:12px;gap:8px}.side-panel{width:100%}}
</style>
</head>

</div>
<div class="breadcrumb" id="breadcrumb"><span class="crumb active">トップ</span></div>
<div class="main-content" id="mainContent">
<div id="mindmapArea"><div class="nodes-grid" id="nodesGrid"></div></div>
<div id="videosArea" class="hidden"><div class="videos-header"><h2 id="videosTitle">バズり動画一覧</h2><div class="sort-control"><select id="videoSort"><option value="views">再生数順</option><option value="likes">いいね順</option><option value="engagement">ER順</option><option value="recent">新しい順</option></select></div></div><div class="videos-grid" id="videosGrid"></div></div>

<div class="side-panel" id="sidePanel"><div class="panel-header"><h3 id="panelTitle">詳細</h3><button class="panel-close" onclick="closePanel()">&times;</button></div><div class="panel-body" id="panelBody"></div></div>

/* === 動画・アカウントモックデータ生成 === */
function generateVideos(keyword, genre, platform, count=30) {
  const platforms = platform === 'both' ? ['tiktok','instagram'] : [platform];
  const vids = [];
  for(let i=0;i<count;i++){
    const p = platforms[i%platforms.length];
    const views = Math.floor(Math.random()*5000000)+50000;
    const likes = Math.floor(views*(Math.random()*0.08+0.02));
    const comments = Math.floor(likes*(Math.random()*0.1+0.01));
    const daysAgo = Math.floor(Math.random()*365);
    const d = new Date(); d.setDate(d.getDate()-daysAgo);
    vids.push({
      id: 'v'+Math.random().toString(36).slice(2,8),
      title: `【${keyword}】${genre==='food'?'これ知らないと損！':'マジで変わった！'}バズり動画#${i+1}`,
      platform: p,
      views, likes, comments,
      shares: Math.floor(comments*(Math.random()*2+0.5)),
      date: d.toISOString().slice(0,10),
      daysAgo,
      engagement: ((likes+comments)/views*100).toFixed(2),
      account: `@${genre==='food'?'gourmet':'beauty'}_creator_${Math.floor(Math.random()*500)}`,
      duration: Math.floor(Math.random()*120)+15,
      keywords: [keyword, genre==='food'?'レシピ':'メイク', genre==='food'?'簡単':'おすすめ']
    });
  }
  return vids.sort((a,b)=>b.views-a.views);
}

function generateAccounts(keyword, genre, platform, count=20) {
  const platforms = platform === 'both' ? ['tiktok','instagram'] : [platform];
  const accs = [];
  for(let i=0;i<count;i++){
    const p = platforms[i%platforms.length];
    const followers = Math.floor(Math.random()*2000000)+1000;
    const growth = (Math.random()*40-5).toFixed(1);
    accs.push({
      id: 'a'+Math.random().toString(36).slice(2,8),
      name: `${genre==='food'?'グルメ':'美容'}クリエイター${i+1}`,
      handle: `@${genre==='food'?'food':'beauty'}_${Math.random().toString(36).slice(2,7)}`,
      platform: p,
      followers,
      growth: parseFloat(growth),
      avgViews: Math.floor(followers*(Math.random()*0.3+0.05)),
      avgEngagement: (Math.random()*8+1).toFixed(2),
      posts: Math.floor(Math.random()*500)+10,
      topKeyword: keyword
    });
  }
  return accs.sort((a,b)=>b.growth-a.growth);
}

/* === 状態管理 === */
let state = {
  genre: 'food',
  platform: 'both',
  period: '1month',
  view: 'mindmap',
  path: [],
  currentData: null
};

function getTopData() {
  return state.genre === 'food' ? FOOD_DATA : BEAUTY_DATA;
}

function getDataAtPath() {
  let data = getTopData();
  for (const key of state.path) {
    if (data[key] && data[key].children) data = data[key].children;
    else if (data[key]) return null;
    else return null;
  }
  return data;
}

function getPeriodMultiplier() {
  const m = {
    '1week': 0.15, '1month': 0.4, '3months': 0.7,
    '6months': 0.85, '1year': 1.0
  };
  return m[state.period] || 1;
}

/* === 描画 === */
function formatNum(n) {
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  let html = `<span class="crumb ${state.path.length===0?'active':''}" onclick="navigateTo(-1)">トップ</span>`;
  state.path.forEach((p, i) => {
    html += `<span class="crumb-sep">›</span>`;
    html += `<span class="crumb ${i===state.path.length-1?'active':''}" onclick="navigateTo(${i})">${p}</span>`;
  });
  el.innerHTML = html;
}

function renderMindmap() {
  const grid = document.getElementById('nodesGrid');
  const data = getDataAtPath();
  if (!data) { grid.innerHTML = '<div class="loading">データがありません</div>'; return; }

  const mult = getPeriodMultiplier();
  const entries = Object.entries(data);
  const maxVol = Math.max(...entries.map(([,v]) => typeof v === 'object' ? (v.volume||v) : v));
  const cls = state.genre === 'food' ? 'food' : 'beauty';

  let html = '';
  entries.sort((a,b) => {
    const va = typeof a[1]==='object' ? (a[1].volume||0) : a[1];
    const vb = typeof b[1]==='object' ? (b[1].volume||0) : b[1];
    return vb - va;
  });

  entries.forEach(([name, val]) => {
    const vol = typeof val === 'object' ? (val.volume || 0) : val;
    const adjVol = Math.floor(vol * mult);
    const pct = (vol / maxVol * 100).toFixed(0);
    const hasChildren = typeof val === 'object' && val.children;
    const childCount = hasChildren ? Object.keys(val.children).length : 0;
    const volClass = adjVol > 50000 ? 'high' : adjVol > 10000 ? 'mid' : 'low';
    const level = state.path.length;

    html += `<div class="node-card ${cls}" onclick="${hasChildren ? `drillDown('${name.replace(/'/g,"\\'")}')` : `showKeywordDetail('${name.replace(/'/g,"\\'")}', ${adjVol})`}">
      <span class="node-badge">Lv${level+1}</span>
      <div class="node-name">${name}</div>
      <div class="node-volume ${volClass}">${formatNum(adjVol)}</div>
      <div class="node-bar"><div class="node-bar-fill ${cls}" style="width:${pct}%"></div></div>
      ${hasChildren ? `<div class="node-children-hint">▶ ${childCount}件の子キーワード</div>` : '<div class="node-children-hint">📊 詳細を見る</div>'}
    </div>`;
  });
  grid.innerHTML = html;
}

function renderVideos() {
  const keyword = state.path.length > 0 ? state.path[state.path.length-1] : (state.genre==='food'?'食品':'美容');
  const videos = generateVideos(keyword, state.genre, state.platform);
  const title = document.getElementById('videosTitle');
  title.textContent = `「${keyword}」のバズり動画`;

  const grid = document.getElementById('videosGrid');
  let html = '';
  videos.forEach((v,i) => {
    html += `<div class="video-card" onclick="showVideoDetail(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="video-rank ${i<3?'top3':''}">${i+1}</div>
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">
          <span class="platform-badge ${v.platform}">${v.platform==='tiktok'?'TikTok':'Instagram'}</span>
          <span>${v.account}</span>
          <span>${v.date}</span>
          <span>${v.duration}秒</span>
        </div>
      </div>
      <div class="video-stats">
        <div class="video-views">${formatNum(v.views)}再生</div>
        <div class="video-engagement">ER ${v.engagement}%</div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function renderAccounts() {
  const keyword = state.path.length > 0 ? state.path[state.path.length-1] : (state.genre==='food'?'食品':'美容');
  const accounts = generateAccounts(keyword, state.genre, state.platform);
  const title = document.getElementById('accountsTitle');
  title.textContent = `「${keyword}」の注目アカウント`;

  const grid = document.getElementById('accountsGrid');
  let html = '';
  accounts.forEach(a => {
    const growthCls = a.growth >= 0 ? 'positive' : 'negative';
    html += `<div class="account-card" onclick="showAccountDetail(${JSON.stringify(a).replace(/"/g,'&quot;')})">
      <div class="account-avatar">${a.name[0]}</div>
      <div class="account-info">
        <div class="account-name">${a.name}</div>
        <div class="account-handle">${a.handle} <span class="platform-badge ${a.platform}">${a.platform==='tiktok'?'TikTok':'IG'}</span></div>
        <div class="account-meta"><span>投稿${a.posts}件</span><span>平均${formatNum(a.avgViews)}再生</span></div>
      </div>
      <div class="account-stats">
        <div class="account-followers">${formatNum(a.followers)}フォロワー</div>
        <div class="account-growth ${growthCls}">${a.growth>=0?'+':''}${a.growth}%</div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function render() {
  document.getElementById('mindmapArea').classList.toggle('hidden', state.view !== 'mindmap');
  document.getElementById('videosArea').classList.toggle('hidden', state.view !== 'videos');
  document.getElementById('accountsArea').classList.toggle('hidden', state.view !== 'accounts');
  renderBreadcrumb();
  if(state.view === 'mindmap') renderMindmap();
  else if(state.view === 'videos') renderVideos();
  else renderAccounts();
}

/* === ナビゲーション === */
function drillDown(name) {
  state.path.push(name);
  render();
}

function navigateTo(index) {
  if(index < 0) state.path = [];
  else state.path = state.path.slice(0, index+1);
  render();
}

      <div class="panel-stat"><span class="panel-stat-label">平均ER</span><span class="panel-stat-value">${a.avgEngagement}%</span></div>
      <div class="panel-stat"><span class="panel-stat-label">投稿数</span><span class="panel-stat-value">${a.posts}</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">注力キーワード</div>
      <div class="panel-tags"><span class="panel-tag">${a.topKeyword}</span></div>
    </div>`;
  panel.classList.add('open');
}

/* === イベント設定 === */
function setupToggles(groupId, stateKey) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state[stateKey] = btn.dataset.value;
      closePanel();
      render();
    });
  });
}

setupToggles('genreToggle','genre');
setupToggles('platformToggle','platform');
setupToggles('periodToggle','period');
setupToggles('viewToggle','view');

/* === 初期描画 === */
render();
</script>
