<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BestBite - レストラン総合比較ツール</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--primary:#e63946;--primary-dark:#c1121f;--bg:#fafafa;--bg-card:#fff;
--text:#1d1d1d;--text-light:#6b7280;--border:#e5e7eb;
--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
--radius:12px;--radius-sm:8px;
--score-high:#16a34a;--score-mid:#f59e0b;--score-low:#9ca3af;
--reserve-ok:#16a34a;--reserve-few:#f59e0b;--reserve-full:#dc2626;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:24px 0;text-align:center}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px}
.logo{font-size:32px;font-weight:800;letter-spacing:-1px}
.tagline{font-size:14px;opacity:.85;margin-top:4px}
.main{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.search-panel{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.search-title{font-size:18px;font-weight:700;margin-bottom:16px}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;font-weight:600;color:var(--text-light)}
.form-group select{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:var(--text);cursor:pointer;transition:border-color .2s}
.form-group select:focus{outline:none;border-color:var(--primary)}
.checkbox-group{justify-content:flex-end}
.checkbox-group label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer}
.checkbox-group input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary)}
.search-actions{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.sort-group{display:flex;align-items:center;gap:8px}
.sort-group label{font-size:13px;font-weight:600;color:var(--text-light);white-space:nowrap}
.sort-group select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff}
.btn-search{background:var(--primary);color:#fff;border:none;padding:12px 40px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s}
.btn-search:hover{background:var(--primary-dark)}
.btn-search:active{transform:scale(.98)}
.score-explanation{margin-bottom:20px}
.score-explanation details{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 16px;border:1px solid var(--border)}
.score-explanation summary{font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer}
.score-explanation p{font-size:13px;color:var(--text-light);margin-top:8px;line-height:1.7}
.result-count{font-size:14px;color:var(--text-light);margin-bottom:16px;font-weight:600}
.result-count strong{color:var(--primary);font-size:20px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.restaurant-card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
.restaurant-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-info{flex:1;min-width:0}
.card-name{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:4px}
.card-meta{font-size:13px;color:var(--text-light);display:flex;gap:8px;flex-wrap:wrap}
.score-badge{flex-shrink:0;width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800}
.score-badge .score-num{font-size:18px;line-height:1}
.score-badge .score-label{font-size:8px;opacity:.9;margin-top:2px}
.score-high{background:var(--score-high)}.score-mid{background:var(--score-mid)}.score-low{background:var(--score-low)}
.card-reviews{padding:0 20px 12px;display:flex;flex-direction:column;gap:6px}
.review-row{display:flex;align-items:center;gap:8px;font-size:12px}
.review-source{width:90px;font-weight:600;color:var(--text-light);flex-shrink:0}
.review-bar-bg{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.review-bar{height:100%;border-radius:4px;transition:width .4s ease}
.bar-tabelog{background:#ff6600}.bar-hotpepper{background:#e4007f}.bar-google{background:#4285f4}
.review-rating{width:30px;text-align:right;font-weight:700;font-size:13px}
.review-count{width:65px;text-align:right;font-size:11px;color:var(--text-light)}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-price{font-size:14px;font-weight:700}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;background:#f3f4f6;color:var(--text-light);font-weight:500}
.tag-atmosphere{background:#ede9fe;color:#7c3aed}
.reservation-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.reserve-available{background:#dcfce7;color:var(--reserve-ok)}
.reserve-few{background:#fef9c3;color:var(--reserve-few)}
.reserve-full{background:#fee2e2;color:var(--reserve-full)}
.modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.modal-content{position:relative;background:var(--bg-card);border-radius:var(--radius);max-width:700px;width:90%;max-height:85vh;overflow-y:auto;padding:32px;box-shadow:var(--shadow-lg)}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:28px;color:var(--text-light);cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}
.detail-name{font-size:22px;font-weight:800}
.detail-sub{font-size:14px;color:var(--text-light);margin-top:4px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:14px;font-weight:700;color:var(--text-light);margin-bottom:8px;letter-spacing:.5px}
.detail-description{font-size:15px;line-height:1.7}
.detail-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.detail-info-item{display:flex;flex-direction:column;gap:2px}
.info-label{font-size:12px;color:var(--text-light);font-weight:600}
.info-value{font-size:14px;font-weight:500}
.detail-reviews{display:flex;flex-direction:column;gap:10px}
.detail-review-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f9fafb;border-radius:var(--radius-sm)}
.detail-review-source{width:110px;font-weight:700;font-size:14px}
.detail-review-rating{font-size:20px;font-weight:800;width:45px}
.detail-review-count{font-size:13px;color:var(--text-light)}
.detail-review-bar-bg{flex:1;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden}
.detail-review-bar{height:100%;border-radius:5px}
.detail-tags{display:flex;flex-wrap:wrap;gap:8px}
.detail-tag{font-size:13px;padding:5px 14px;border-radius:20px;background:#f3f4f6;font-weight:500}
.footer{text-align:center;padding:24px;font-size:13px;color:var(--text-light);border-top:1px solid var(--border)}
.no-results{text-align:center;padding:60px 20px;color:var(--text-light)}
.no-results h3{font-size:18px;margin-bottom:8px;color:var(--text)}
@media(max-width:768px){
.search-grid{grid-template-columns:repeat(2,1fr)}
.results-grid{grid-template-columns:1fr}
.detail-info-grid{grid-template-columns:1fr}
.search-actions{flex-direction:column;align-items:stretch}
.btn-search{width:100%}
}
@media(max-width:480px){
.search-grid{grid-template-columns:1fr}
.logo{font-size:24px}
}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<h1 class="logo">BestBite</h1>
<p class="tagline">食べログ・ホットペッパー・Google 口コミを総合比較</p>
</div>
</header>
<main class="main">
<section class="search-panel">
<h2 class="search-title">レストランを探す</h2>
<div class="search-grid">
<div class="form-group"><label for="area">エリア</label><select id="area"><option value="">すべてのエリア</option></select></div>
<div class="form-group"><label for="genre">料理ジャンル</label><select id="genre"><option value="">すべてのジャンル</option></select></div>
<div class="form-group"><label for="atmosphere">雰囲気</label><select id="atmosphere"><option value="">こだわりなし</option></select></div>
<div class="form-group"><label for="party_size">人数</label><select id="party_size">
<option value="0">指定なし</option><option value="2">2人</option><option value="4">4人</option><option value="6">6人</option><option value="8">8人</option><option value="10">10人</option><option value="20">20人以上</option><option value="50">50人以上</option>
</select></div>
<div class="form-group"><label for="budget_min">予算（下限）</label><select id="budget_min">
<option value="0">指定なし</option><option value="1000">¥1,000〜</option><option value="3000">¥3,000〜</option><option value="5000">¥5,000〜</option><option value="8000">¥8,000〜</option><option value="10000">¥10,000〜</option><option value="15000">¥15,000〜</option><option value="20000">¥20,000〜</option>
</select></div>
<div class="form-group"><label for="budget_max">予算（上限）</label><select id="budget_max">
<option value="0">指定なし</option><option value="3000">〜¥3,000</option><option value="5000">〜¥5,000</option><option value="8000">〜¥8,000</option><option value="10000">〜¥10,000</option><option value="15000">〜¥15,000</option><option value="20000">〜¥20,000</option><option value="30000">〜¥30,000</option><option value="50000">〜¥50,000</option>
</select></div>
<div class="form-group"><label for="reservation">予約状況</label><select id="reservation">
<option value="">すべて</option><option value="available">予約可能</option><option value="few">残りわずか</option>
</select></div>
<div class="form-group checkbox-group"><label><input type="checkbox" id="private_room"> 個室あり</label></div>
</div>
<div class="search-actions">
<div class="sort-group"><label for="sort_by">並び替え:</label><select id="sort_by">
<option value="score">総合スコア順（おすすめ）</option><option value="review_count">口コミ件数順</option><option value="price_low">価格が安い順</option><option value="price_high">価格が高い順</option>
</select></div>
<button class="btn-search" onclick="searchRestaurants()">検索する</button>
</div>
</section>
<section class="score-explanation"><details>
<summary>総合スコアの算出方法</summary>
<p>各サイト（食べログ・ホットペッパー・Google）の評価を<strong>ベイズ平均</strong>で信頼性スコアに変換し、サイトごとの重み付け（食べログ40%、Google 35%、ホットペッパー25%）で統合。口コミが少ない店舗は全体平均に近づくため、<strong>口コミ件数が多く評価も高い店舗</strong>が上位に表示されます。</p>
</details></section>
<div id="result-count" class="result-count" style="display:none"></div>
<div id="results" class="results-grid"></div>
<div id="modal" class="modal" style="display:none">
<div class="modal-overlay" onclick="closeModal()"></div>
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">&times;</button>
<div id="modal-body"></div>
</div>
</div>
</main>
<footer class="footer"><p>BestBite - レストラン総合比較ツール | デモ版</p></footer>

var GENRES=["和食","寿司","焼肉","イタリアン","フレンチ","中華","韓国料理","居酒屋","ラーメン","カフェ","タイ料理","インド料理","スペイン料理","ビストロ","鉄板焼き"];
var ATMOSPHERES=["おしゃれ","落ち着いた","にぎやか","デート向き","隠れ家","カジュアル","高級感","アットホーム","モダン","和モダン","テラス席あり","夜景が見える","個室あり","大人数OK","静か"];
var AREAS=["渋谷","新宿","恵比寿","表参道","六本木","銀座","池袋","目黒","中目黒","代官山","青山","赤坂","麻布十番","白金","丸の内","上野"];
var allResults=[];

// ベイズ平均スコア
function bayesScore(rating,count){var m=30,c=3.3;if(count===0)return c;return(count/(count+m))*rating+(m/(count+m))*c;}
var WEIGHTS={tabelog:0.40,hotpepper:0.25,google:0.35};
function overallScore(reviews){if(!reviews||!reviews.length)return 0;var tw=0,ws=0;for(var i=0;i<reviews.length;i++){var r=reviews[i];var w=WEIGHTS[r.source]||0.2;ws+=bayesScore(r.rating,r.review_count)*w;tw+=w;}return tw?Math.round(ws/tw*100)/100:0;}
// 初期化
document.addEventListener("DOMContentLoaded",function(){
populateSel("area",AREAS);populateSel("genre",GENRES);populateSel("atmosphere",ATMOSPHERES);
searchRestaurants();
});
function populateSel(id,items){var el=document.getElementById(id);for(var i=0;i<items.length;i++){var o=document.createElement("option");o.value=items[i];o.textContent=items[i];el.appendChild(o);}}

// 検索
function searchRestaurants(){
var area=document.getElementById("area").value;
var genre=document.getElementById("genre").value;
var atm=document.getElementById("atmosphere").value;
var ps=parseInt(document.getElementById("party_size").value)||0;
var bmin=parseInt(document.getElementById("budget_min").value)||0;
var bmax=parseInt(document.getElementById("budget_max").value)||0;
var rs=document.getElementById("reservation").value;
var pr=document.getElementById("private_room").checked;
var sort=document.getElementById("sort_by").value;
var res=[];
for(var i=0;i<RESTAURANTS.length;i++){
var r=RESTAURANTS[i];
if(area&&r.area!==area)continue;
if(genre&&r.genre!==genre)continue;
if(atm&&r.atmosphere_tags.indexOf(atm)<0)continue;
if(bmin&&r.price_max<bmin)continue;
if(bmax&&r.price_min>bmax)continue;
if(ps&&r.capacity<ps)continue;
if(rs&&r.reservation_status!==rs)continue;
if(pr&&!r.has_private_room)continue;
var item=Object.assign({},r);
item.overall_score=overallScore(r.reviews);
res.push(item);
}
if(sort==="price_low")res.sort(function(a,b){return a.price_min-b.price_min;});
else if(sort==="price_high")res.sort(function(a,b){return b.price_max-a.price_max;});
else if(sort==="review_count")res.sort(function(a,b){var sa=0,sb=0;for(var j=0;j<a.reviews.length;j++)sa+=a.reviews[j].review_count;for(var k=0;k<b.reviews.length;k++)sb+=b.reviews[k].review_count;return sb-sa;});
else res.sort(function(a,b){return b.overall_score-a.overall_score;});
allResults=res;
renderResults(res);
}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function scCls(s){return s>=4?"score-high":s>=3.5?"score-mid":"score-low";}
function rvCls(s){return s==="available"?"reserve-available":s==="few"?"reserve-few":"reserve-full";}
function barCls(s){return s==="tabelog"?"bar-tabelog":s==="hotpepper"?"bar-hotpepper":"bar-google";}

function renderResults(list){
var el=document.getElementById("results"),ct=document.getElementById("result-count");
if(!list.length){el.innerHTML='<div class="no-results"><h3>条件に合うレストランが見つかりません</h3><p>条件を変更して再検索してみてください</p></div>';ct.style.display="none";return;}
ct.innerHTML="<strong>"+list.length+"</strong> 件のレストランが見つかりました";ct.style.display="block";
var h="";for(var i=0;i<list.length;i++)h+=buildCard(list[i],i);
el.innerHTML=h;
}

function buildCard(r,idx){
var sc=r.overall_score?r.overall_score.toFixed(2):"-.--";
var rv="";
for(var j=0;j<r.reviews.length;j++){var v=r.reviews[j];rv+='<div class="review-row"><span class="review-source">'+esc(v.source_label)+'</span><div class="review-bar-bg"><div class="review-bar '+barCls(v.source)+'" style="width:'+(v.rating/5*100)+'%"></div></div><span class="review-rating">'+v.rating.toFixed(1)+'</span><span class="review-count">'+v.review_count.toLocaleString()+'件</span></div>';}
var tg="";for(var k=0;k<r.atmosphere_tags.length&&k<3;k++)tg+='<span class="tag tag-atmosphere">'+esc(r.atmosphere_tags[k])+'</span>';
return '<div class="restaurant-card" onclick="openModal('+idx+')"><div class="card-header"><div class="card-info"><div class="card-name">'+esc(r.name)+'</div><div class="card-meta"><span>'+esc(r.genre)+'</span><span>|</span><span>'+esc(r.area)+'</span></div></div><div class="score-badge '+scCls(r.overall_score)+'"><span class="score-num">'+sc+'</span><span class="score-label">SCORE</span></div></div><div class="card-reviews">'+rv+'</div><div class="card-footer"><span class="card-price">'+esc(r.price_label)+'</span><div class="card-tags"><span class="reservation-badge '+rvCls(r.reservation_status)+'">'+esc(r.reservation_label)+'</span>'+tg+'</div></div></div>';
}
function openModal(idx){
var r=allResults[idx];if(!r)return;
var sc=r.overall_score?r.overall_score.toFixed(2):"-.--";
var rv="";for(var j=0;j<r.reviews.length;j++){var v=r.reviews[j];rv+='<div class="detail-review-row"><span class="detail-review-source">'+esc(v.source_label)+'</span><span class="detail-review-rating">'+v.rating.toFixed(1)+'</span><div class="detail-review-bar-bg"><div class="detail-review-bar '+barCls(v.source)+'" style="width:'+(v.rating/5*100)+'%"></div></div><span class="detail-review-count">'+v.review_count.toLocaleString()+'件</span></div>';}
var tg="";var tags=(r.atmosphere_tags||[]).concat(r.features||[]);for(var k=0;k<tags.length;k++)tg+='<span class="detail-tag">'+esc(tags[k])+'</span>';
function inf(l,v){return '<div class="detail-info-item"><span class="info-label">'+esc(l)+'</span><span class="info-value">'+esc(v||"-")+'</span></div>';}
var html='<div class="detail-header"><div><div class="detail-name">'+esc(r.name)+'</div><div class="detail-sub">'+esc(r.genre)+" / "+esc(r.sub_genre||"")+" - "+esc(r.area)+'</div></div><div class="score-badge '+scCls(r.overall_score)+'" style="width:64px;height:64px"><span class="score-num" style="font-size:22px">'+sc+'</span><span class="score-label">SCORE</span></div></div>';
html+='<div class="detail-section"><h3>説明</h3><p class="detail-description">'+esc(r.description)+'</p></div>';
html+='<div class="detail-section"><h3>各サイトの評価</h3><div class="detail-reviews">'+rv+'</div></div>';
html+='<div class="detail-section"><h3>店舗情報</h3><div class="detail-info-grid">'+inf("住所",r.address)+inf("価格帯",r.price_label)+inf("営業時間",r.open_hours)+inf("定休日",r.closed_days)+inf("席数",r.capacity+"席")+inf("個室",r.has_private_room?"あり":"なし")+inf("喫煙",r.smoking)+'<div class="detail-info-item"><span class="info-label">予約状況</span><span class="info-value"><span class="reservation-badge '+rvCls(r.reservation_status)+'">'+esc(r.reservation_label)+'</span></span></div></div></div>';
html+='<div class="detail-section"><h3>雰囲気・特徴</h3><div class="detail-tags">'+tg+'</div></div>';
document.getElementById("modal-body").innerHTML=html;
document.getElementById("modal").style.display="flex";
document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modal").style.display="none";document.body.style.overflow="";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
</script>
