    // ===== WeeklyReport =====
    function WeeklyReportPage() {
      const { state, dispatch } = useStore();
      const [loading, setLoading] = useState(false);
      const [expandedId, setExpandedId] = useState(null);
      const generate = async () => {
        if (!state.settings.anthropicApiKey) { alert('\u8A2D\u5B9A\u753B\u9762\u3067Anthropic API\u30AD\u30FC\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044'); return; }
        setLoading(true);
        try {
          const r = await generateWeeklyReport(state.kpis, state.tasks, state.settings.anthropicApiKey);
          const report = { id: genId(), weekStart: r.weekStart || new Date().toISOString().split('T')[0], weekEnd: r.weekEnd || new Date().toISOString().split('T')[0], kpiSummary: r.kpiSummary || state.kpis.map(k => ({platform: k.platform, metric: k.metric, target: k.target, actual: k.actual, achievementRate: k.target > 0 ? Math.round((k.actual/k.target)*100) : 0})), gapAnalysis: r.gapAnalysis || '', nextWeekActions: r.nextWeekActions || [], generatedAt: new Date().toISOString() };
          dispatch({ type: 'ADD_WEEKLY_REPORT', payload: report });
          setExpandedId(report.id);
          dispatch({ type: 'ADD_LOG', payload: { id: genId(), timestamp: new Date().toISOString(), action: '\u9031\u6B21\u30EC\u30DD\u30FC\u30C8\u751F\u6210', decision: 'Claude API\u3067\u81EA\u52D5\u751F\u6210', reason: '\u5B9A\u671F\u30EC\u30DD\u30FC\u30C8', result: '\u751F\u6210\u5B8C\u4E86' } });
        } catch(e) { alert('\u30EC\u30DD\u30FC\u30C8\u751F\u6210\u30A8\u30E9\u30FC: ' + e.message); }
        setLoading(false);
      };
      const achColor = r => r >= 80 ? 'text-success' : r >= 50 ? 'text-warning' : 'text-danger';
      const reports = [...state.weeklyReports].reverse();
      return (
        <div>
          <div className="page-header"><h2 className="page-title">{'\u9031\u6B21\u30EC\u30DD\u30FC\u30C8'}</h2><p className="page-subtitle">{'KPI\u9054\u6210\u7387\u30FB\u30AE\u30E3\u30C3\u30D7\u5206\u6790\u30FB\u7FCC\u9031\u30A2\u30AF\u30B7\u30E7\u30F3\u63D0\u6848'}</p></div>
          <div className="mb-2"><button className="btn btn-primary" onClick={generate} disabled={loading}>{loading ? <span className="loading-text"><span className="loading-spinner" />{'\u751F\u6210\u4E2D...'}</span> : '\u9031\u6B21\u30EC\u30DD\u30FC\u30C8\u3092\u751F\u6210'}</button></div>
          {reports.length === 0 ? (
            <div className="empty-state"><div className="empty-state-icon">{'\uD83D\uDCCB'}</div><p>{'KPI\u30C7\u30FC\u30BF\u3092\u767B\u9332\u3057\u3066\u304B\u3089\u30EC\u30DD\u30FC\u30C8\u3092\u751F\u6210\u3057\u3066\u304F\u3060\u3055\u3044'}</p></div>
          ) : reports.map(rpt => (
            <div key={rpt.id} className="report-card">
              <div className="report-header" onClick={() => setExpandedId(expandedId === rpt.id ? null : rpt.id)}>
                <div><strong>{rpt.weekStart} \u301C {rpt.weekEnd}</strong><span className="text-sm text-muted" style={{marginLeft: '1rem'}}>{'\u751F\u6210: '}{new Date(rpt.generatedAt).toLocaleString('ja-JP')}</span></div>
                <span>{expandedId === rpt.id ? '\u25BC' : '\u25B6'}</span>
              </div>
              {expandedId === rpt.id && (
                <div className="report-body">
                  <div className="report-section"><h4 style={{color: 'var(--primary)', marginBottom: '0.5rem'}}>{'KPI\u9054\u6210\u72B6\u6CC1'}</h4>
                    <table><thead><tr><th>{'\u30D7\u30E9\u30C3\u30C8\u30D5\u30A9\u30FC\u30E0'}</th><th>{'\u6307\u6A19'}</th><th>{'\u76EE\u6A19'}</th><th>{'\u5B9F\u7E3E'}</th><th>{'\u9054\u6210\u7387'}</th></tr></thead>
                    <tbody>{(rpt.kpiSummary || []).map((k, i) => (
                      <tr key={i}><td>{PLATFORM_LABELS[k.platform] || k.platform}</td><td>{METRIC_LABELS[k.metric] || k.metric}</td><td>{k.target?.toLocaleString()}</td><td>{k.actual?.toLocaleString()}</td><td className={achColor(k.achievementRate)}>{k.achievementRate}%</td></tr>
                    ))}</tbody></table>
                  </div>
                  <div className="report-section"><h4 style={{color: 'var(--primary)', marginBottom: '0.5rem'}}>{'\u30AE\u30E3\u30C3\u30D7\u5206\u6790'}</h4><p className="text-sm">{rpt.gapAnalysis}</p></div>
                  <div className="report-section"><h4 style={{color: 'var(--primary)', marginBottom: '0.5rem'}}>{'\u7FCC\u9031\u30A2\u30AF\u30B7\u30E7\u30F3'}</h4>
                    <ul style={{paddingLeft: '1.25rem'}}>{(rpt.nextWeekActions || []).map((a, i) => <li key={i} className="text-sm">{a}</li>)}</ul>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // ===== Settings =====
    function Settings() {
      const { state, dispatch } = useStore();
      const [form, setForm] = useState({...state.settings});
      const [saved, setSaved] = useState(false);
      const [testRes, setTestRes] = useState({});
      const [showGoogle, setShowGoogle] = useState(false);
      const save = () => {
        dispatch({ type: 'UPDATE_SETTINGS', payload: form });
        setSaved(true); setTimeout(() => setSaved(false), 3000);
        dispatch({ type: 'ADD_LOG', payload: { id: genId(), timestamp: new Date().toISOString(), action: '\u8A2D\u5B9A\u66F4\u65B0', decision: 'API\u8A2D\u5B9A\u3092\u4FDD\u5B58', reason: '\u30E6\u30FC\u30B6\u30FC\u64CD\u4F5C', result: '\u4FDD\u5B58\u5B8C\u4E86' } });
      };
      const testClaude = async () => {
        if (!form.anthropicApiKey) { setTestRes(p => ({...p, claude: '\u30AD\u30FC\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044'})); return; }
        setTestRes(p => ({...p, claude: '\u30C6\u30B9\u30C8\u4E2D...'}));
        try {
          const r = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': form.anthropicApiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }, body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 10, messages: [{ role: 'user', content: 'ping' }] }) });
          if (r.ok) { setTestRes(p => ({...p, claude: '\u2705 \u63A5\u7D9A\u6210\u529F'})); }
          else { const body = await r.text(); setTestRes(p => ({...p, claude: '\u274C \u30A8\u30E9\u30FC(' + r.status + '): ' + body.slice(0, 200)})); }
        } catch(e) { setTestRes(p => ({...p, claude: '\u274C ' + e.message})); }
      };
      const testGemini = async () => {
        if (!form.geminiApiKey) { setTestRes(p => ({...p, gemini: '\u30AD\u30FC\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044'})); return; }
        if (form.geminiApiKey.startsWith('gen-lang')) { setTestRes(p => ({...p, gemini: '\u274C \u3053\u308C\u306F\u30AF\u30E9\u30A4\u30A2\u30F3\u30C8ID\u3067\u3059\u3002Google AI Studio\u306EAIzaSy...\u3067\u59CB\u307E\u308B\u30AD\u30FC\u3092\u4F7F\u3063\u3066\u304F\u3060\u3055\u3044'})); return; }
        setTestRes(p => ({...p, gemini: '\u30C6\u30B9\u30C8\u4E2D...'}));
        try {
          const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + form.geminiApiKey, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: 'ping' }] }] }) });
          if (r.ok) { setTestRes(p => ({...p, gemini: '\u2705 \u63A5\u7D9A\u6210\u529F'})); }
          else { const body = await r.text(); setTestRes(p => ({...p, gemini: '\u274C \u30A8\u30E9\u30FC(' + r.status + '): ' + body.slice(0, 200)})); }
        } catch(e) { setTestRes(p => ({...p, gemini: '\u274C ' + e.message})); }
      };
      return (
        <div>
          <div className="page-header"><h2 className="page-title">{'\u8A2D\u5B9A'}</h2><p className="page-subtitle">{'API\u30AD\u30FC\u306E\u8A2D\u5B9A'}</p></div>
          <div style={{maxWidth: 640}}>
            <div className="card" style={{marginBottom: '1rem', padding: '1.25rem'}}>
              <h3 style={{marginBottom: '1rem', fontSize: '1.1rem'}}>{'AI API\u30AD\u30FC\uFF08\u5FC5\u9808\uFF09'}</h3>
              <div className="form-group">
                <label className="form-label">{'Anthropic API\u30AD\u30FC'}</label>
                <p className="text-sm text-muted" style={{marginBottom: '0.35rem'}}>{'Discord\u306E#api\u30AD\u30FC\u30C1\u30E3\u30F3\u30CD\u30EB\u306E\u300C\u30AF\u30ED\u30FC\u30C9\u300D\u306E\u30AD\u30FC\uFF08sk-ant-api03-...\u3067\u59CB\u307E\u308B\uFF09'}</p>
                <div className="form-inline">
                  <input className="form-input" type="password" value={form.anthropicApiKey || ''} onChange={e => { setForm(p => ({...p, anthropicApiKey: e.target.value})); setSaved(false); }} placeholder="sk-ant-api03-..." />
                  <button className="btn btn-ghost btn-sm" onClick={testClaude}>{'\u30C6\u30B9\u30C8'}</button>
                </div>
                {testRes.claude && <p className={'text-sm mt-1 ' + (testRes.claude.includes('\u6210\u529F') ? 'text-success' : 'text-danger')}>{testRes.claude}</p>}
              </div>
              <div className="form-group">
                <label className="form-label">{'Gemini API\u30AD\u30FC'}</label>
                <p className="text-sm text-muted" style={{marginBottom: '0.35rem'}}>{'Discord\u306E#api\u30AD\u30FC\u30C1\u30E3\u30F3\u30CD\u30EB\u306E\u300CGoogle AI Studio\u300D\u306E\u30AD\u30FC\uFF08AIzaSy...\u3067\u59CB\u307E\u308B\uFF09'}<br/>{'gen-lang-client-...\u306F\u30AF\u30E9\u30A4\u30A2\u30F3\u30C8ID\u306A\u306E\u3067\u4F7F\u3048\u307E\u305B\u3093'}</p>
                <div className="form-inline">
                  <input className="form-input" type="password" value={form.geminiApiKey || ''} onChange={e => { setForm(p => ({...p, geminiApiKey: e.target.value})); setSaved(false); }} placeholder="AIzaSy..." />
                  <button className="btn btn-ghost btn-sm" onClick={testGemini}>{'\u30C6\u30B9\u30C8'}</button>
                </div>
                {testRes.gemini && <p className={'text-sm mt-1 ' + (testRes.gemini.includes('\u6210\u529F') ? 'text-success' : 'text-danger')}>{testRes.gemini}</p>}
              </div>
            </div>

            <div className="card" style={{marginBottom: '1rem', padding: '1.25rem'}}>
              <div className="flex justify-between items-center" style={{cursor:'pointer'}} onClick={() => setShowGoogle(!showGoogle)}>
                <h3 style={{fontSize: '1.1rem'}}>{'Google\u9023\u643A\uFF08\u4EFB\u610F\u30FB\u5F8C\u304B\u3089\u3067OK\uFF09'}</h3>
                <span>{showGoogle ? '\u25BC' : '\u25B6'}</span>
              </div>
              {showGoogle && (
                <div style={{marginTop: '1rem'}}>
                  <div className="alert alert-info" style={{marginBottom: '1rem'}}>{'Google Drive/Docs/Sheets\u3068\u306E\u9023\u643A\u306F\u5F8C\u304B\u3089\u8A2D\u5B9A\u3067\u304D\u307E\u3059\u3002AI\u5206\u6790\u3084\u30BF\u30B9\u30AF\u7BA1\u7406\u306F\u4E0A\u306EAPI\u30AD\u30FC\u3060\u3051\u3067\u4F7F\u3048\u307E\u3059\u3002'}</div>
                  {[
                    { key: 'googleClientId', label: 'Google Client ID', placeholder: 'xxxx.apps.googleusercontent.com' },
                    { key: 'googleApiKey', label: 'Google API Key', placeholder: 'AIzaSy...' },
                    { key: 'driveRootFolderId', label: 'Drive\u30EB\u30FC\u30C8\u30D5\u30A9\u30EB\u30C0ID', placeholder: 'Google Drive\u306EURL\u306Ed/\u306E\u5F8C\u306E\u6587\u5B57\u5217' },
                    { key: 'kpiSheetId', label: 'KPI\u30B7\u30FC\u30C8ID', placeholder: '\u30B9\u30D7\u30EC\u30C3\u30C9\u30B7\u30FC\u30C8URL\u306Ed/\u306E\u5F8C\u306E\u6587\u5B57\u5217' },
                  ].map(f => (
                    <div key={f.key} className="form-group">
                      <label className="form-label">{f.label}</label>
                      <input className="form-input" value={form[f.key] || ''} onChange={e => { setForm(p => ({...p, [f.key]: e.target.value})); setSaved(false); }} placeholder={f.placeholder} />
                    </div>
                  ))}
                  <div style={{marginTop: '1rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem'}}>
                    <div className="flex justify-between items-center" style={{marginBottom: '0.75rem'}}>
                      <label className="form-label" style={{margin: 0, fontSize: '1rem', fontWeight: 600}}>{'\u9032\u6357\u30B7\u30FC\u30C8\uFF08\u8907\u6570\u767B\u9332\u53EF\uFF09'}</label>
                      <button className="btn btn-primary btn-sm" onClick={() => { setForm(p => ({...p, progressSheets: [...(p.progressSheets || []), {id: genId(), name: '', sheetId: ''}]})); setSaved(false); }}>{'\uFF0B \u8FFD\u52A0'}</button>
                    </div>
                    <p className="text-sm text-muted" style={{marginBottom: '0.75rem'}}>{'URL\u306E d/ \u306E\u5F8C\u306E\u6587\u5B57\u5217\u304C\u30B7\u30FC\u30C8ID\u3067\u3059\u3002\u4F8B: docs.google.com/spreadsheets/d/\u3010\u3053\u3053\u3011/edit'}</p>
                    {(form.progressSheets || []).length === 0 && (
                      <div className="text-sm text-muted" style={{padding: '1rem', textAlign: 'center', background: 'var(--bg-input)', borderRadius: 'var(--border-radius)'}}>
                        {'\u300C\uFF0B \u8FFD\u52A0\u300D\u3067\u9032\u6357\u30B7\u30FC\u30C8\u3092\u767B\u9332\u3067\u304D\u307E\u3059'}
                      </div>
                    )}
                    {(form.progressSheets || []).map((sheet, idx) => (
                      <div key={sheet.id} style={{display: 'flex', gap: '0.5rem', alignItems: 'flex-end', marginBottom: '0.5rem'}}>
                        <div style={{flex: 1}}>
                          {idx === 0 && <label className="form-label">{'\u30C1\u30E3\u30F3\u30CD\u30EB\u540D'}</label>}
                          <input className="form-input" value={sheet.name} onChange={e => { const sheets = [...(form.progressSheets || [])]; sheets[idx] = {...sheets[idx], name: e.target.value}; setForm(p => ({...p, progressSheets: sheets})); setSaved(false); }} placeholder={'\u4F8B: AI\u7F8E\u5BB9 \u9032\u884C\u8868'} />
                        </div>
                        <div style={{flex: 1.5}}>
                          {idx === 0 && <label className="form-label">{'\u30B7\u30FC\u30C8ID'}</label>}
                          <input className="form-input" value={sheet.sheetId} onChange={e => { const sheets = [...(form.progressSheets || [])]; sheets[idx] = {...sheets[idx], sheetId: e.target.value}; setForm(p => ({...p, progressSheets: sheets})); setSaved(false); }} placeholder={'\u30B9\u30D7\u30EC\u30C3\u30C9\u30B7\u30FC\u30C8ID'} />
                        </div>
                        <button className="btn btn-danger btn-sm" style={{marginBottom: idx === 0 ? 0 : 0}} onClick={() => { const sheets = (form.progressSheets || []).filter((_, i) => i !== idx); setForm(p => ({...p, progressSheets: sheets})); setSaved(false); }}>{'\u524A\u9664'}</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="flex gap-1 items-center">
              <button className="btn btn-primary" onClick={save}>{'\u8A2D\u5B9A\u3092\u4FDD\u5B58'}</button>
              {saved && <span className="text-success text-sm">{'\u4FDD\u5B58\u3057\u307E\u3057\u305F'}</span>}
            </div>
          </div>
        </div>
      );
    }

    // ===== App =====
    function App() {
      const [hash, setHash] = useState(window.location.hash || '#/');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      useEffect(() => {
        const onHash = () => setHash(window.location.hash || '#/');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const pages = {
        '#/': Dashboard,
        '#/kpi': KPIDashboard,
        '#/tasks': TaskBoard,
        '#/google': GooglePanel,
        '#/automation': AutomationCenter,
        '#/cost': CostManager,
        '#/report': WeeklyReportPage,
        '#/settings': Settings,
      };
      const Page = pages[hash] || Dashboard;
      return (
        <StoreProvider>
          <div className="app-layout">
            <Sidebar isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} currentHash={hash} />
            <div className="main-content">
              <header className="top-bar">
                <button className="menu-btn" onClick={() => setSidebarOpen(true)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 className="top-bar-title">SNS AI {'\u751F\u7523\u6027\u30C4\u30FC\u30EB'}</h1>
              </header>
              <main className="page-content"><Page /></main>
            </div>
          </div>
        </StoreProvider>
      );
    }

    // ===== Render =====
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
