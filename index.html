<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS Research Tool - 食品 & 美容</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:linear-gradient(135deg,#0d1117,#161b22);border-bottom:1px solid #30363d}
.logo{font-size:20px;font-weight:700;color:#58a6ff}
.logo-sub{font-size:12px;color:#8b949e;margin-left:12px}
.control-bar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:12px 24px;background:#0d1117;border-bottom:1px solid #21262d}
.control-group{display:flex;align-items:center;gap:8px}
.control-group label{font-size:12px;color:#8b949e;white-space:nowrap}
.toggle-group{display:flex;gap:2px;background:#161b22;border-radius:8px;padding:2px;flex-wrap:wrap}
.toggle-btn{padding:5px 12px;border:none;background:transparent;color:#8b949e;font-size:12px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toggle-btn.active{background:#1f6feb;color:#fff}
.toggle-btn:hover:not(.active){color:#c9d1d9;background:#21262d}
.breadcrumb{display:flex;align-items:center;gap:4px;padding:8px 24px;font-size:13px;color:#8b949e;background:#0d1117;flex-wrap:wrap}
.crumb{cursor:pointer;padding:2px 8px;border-radius:4px;transition:all .2s}
.crumb:hover{color:#58a6ff;background:#161b22}
.crumb.active{color:#e0e0e0;font-weight:600}
.crumb-sep{color:#30363d;margin:0 2px}
.stats-bar{display:flex;gap:24px;padding:8px 24px;background:#0d1117;border-bottom:1px solid #161b22;font-size:12px;color:#8b949e;flex-wrap:wrap}
.stats-bar span{display:flex;align-items:center;gap:4px}
.stats-bar .num{color:#58a6ff;font-weight:700}
.main-content{position:relative;height:calc(100vh - 180px);overflow:hidden}
.view-area{width:100%;height:100%;overflow-y:auto;position:absolute;top:0;left:0}
.nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:20px}
.node-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px;cursor:pointer;transition:all .3s;position:relative;display:flex;flex-direction:column;gap:6px}
.node-card:hover{border-color:#58a6ff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(88,166,255,.15)}
.node-card.food{border-left:3px solid #f0883e}
.node-card.beauty{border-left:3px solid #f778ba}
.node-badge{position:absolute;top:8px;right:8px;font-size:10px;padding:2px 6px;border-radius:10px;background:#21262d;color:#8b949e}
.node-name{font-size:13px;font-weight:600;color:#e0e0e0;line-height:1.3}
.node-volume{font-size:20px;font-weight:700}
.node-volume.high{color:#3fb950}
.node-volume.mid{color:#d29922}
.node-volume.low{color:#8b949e}
.node-hint{font-size:11px;color:#58a6ff}
.node-bar{height:3px;background:#21262d;border-radius:2px;margin-top:2px}
.node-bar-fill{height:100%;border-radius:2px}
.node-bar-fill.food{background:linear-gradient(90deg,#f0883e,#ffa657)}
.node-bar-fill.beauty{background:linear-gradient(90deg,#f778ba,#ff9bce)}
.vheader{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#0a0a1a;z-index:10}
.vheader h2{font-size:16px;color:#e0e0e0}
.vheader select{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:6px;font-size:12px}
.vlist{padding:12px 24px;display:flex;flex-direction:column;gap:6px}
.vcard{display:grid;grid-template-columns:50px 1fr auto;gap:10px;align-items:center;padding:10px 14px;background:#161b22;border:1px solid #21262d;border-radius:8px;cursor:pointer;transition:all .2s}
.vcard:hover{border-color:#30363d;background:#1c2129}
.vrank{font-size:22px;font-weight:700;color:#30363d;text-align:center}
.vrank.top3{color:#ffa657}
.vinfo{display:flex;flex-direction:column;gap:3px}
.vtitle{font-size:13px;font-weight:600;color:#e0e0e0}
.vtitle a{color:#58a6ff;text-decoration:none}
.vtitle a:hover{text-decoration:underline}
.vmeta{font-size:11px;color:#8b949e;display:flex;gap:10px;flex-wrap:wrap}
.vstats{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.vviews{font-size:15px;font-weight:700;color:#3fb950}
.ver{font-size:11px;color:#d29922}
.pbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.pbadge.tiktok{background:#1a1a2e;color:#69c9d0}
.pbadge.instagram{background:#2a1a2e;color:#e1306c}
.acard{display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;padding:10px 14px;background:#161b22;border:1px solid #21262d;border-radius:8px;cursor:pointer;transition:all .2s}
.acard:hover{border-color:#30363d;background:#1c2129}
.aav{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1f6feb,#58a6ff);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.aname{font-size:13px;font-weight:600;color:#e0e0e0}
.ahandle{font-size:12px;color:#8b949e}
.agrowth{font-size:13px;font-weight:600}
.agrowth.pos{color:#3fb950}
.agrowth.neg{color:#f85149}
.side{width:380px;background:#0d1117;border-left:1px solid #21262d;display:flex;flex-direction:column;overflow-y:auto;position:fixed;right:0;top:0;bottom:0;z-index:100;box-shadow:-4px 0 24px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .3s}
.side.open{transform:translateX(0)}
.side-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#0d1117;z-index:5}
.side-hdr h3{font-size:15px;color:#e0e0e0}
.side-close{background:none;border:none;color:#8b949e;font-size:24px;cursor:pointer;padding:0 4px;line-height:1}
.side-close:hover{color:#f85149}
.side-body{padding:14px;flex:1}
.psec{margin-bottom:16px}
.psec-t{font-size:11px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.pstat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #161b22;font-size:12px}
.pstat-l{color:#8b949e}
.pstat-v{color:#e0e0e0;font-weight:600}
.ptags{display:flex;flex-wrap:wrap;gap:4px}
.ptag{font-size:11px;padding:2px 8px;border-radius:12px;background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
@media(max-width:768px){.control-bar{padding:8px 12px;gap:8px}.toggle-btn{padding:4px 8px;font-size:11px}.nodes-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));padding:10px;gap:6px}.side{width:100%}}
</style>
</head>

/* === 状態管理 === */
let S={genre:'food',platform:'both',period:'1m',view:'map',path:[]};

function seed(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}

/* Lv2子キーワード50個生成 */
function getL2(name){
  const g=S.genre;
  const map=g==='food'?FOOD_L2:BEAUTY_L2;
  if(map[name]) return map[name].map((w,i)=>{
    const r=seed(name+w);
    return [w, Math.floor(r()*80000)+5000];
  });
  // マッピングにない場合は自動生成
  const mods=g==='food'?FOOD_MODS:BEAUTY_MODS;
  const arr=[];
  const rng=seed(name+'L2');
  for(let i=0;i<50;i++){
    arr.push([name+"×"+mods[i], Math.floor(rng()*60000)+5000]);
  }
  return arr;
}

/* Lv3子キーワード50個生成 */
function getL3(parent, name){
  const g=S.genre;
  const mods=g==='food'?FOOD_MODS:BEAUTY_MODS;
  const arr=[];
  const rng=seed(parent+name+'L3');
  for(let i=0;i<50;i++){
    arr.push([name+" "+mods[i%mods.length], Math.floor(rng()*40000)+2000]);
  }
  return arr;
}

function getDataAtPath(){
  const l1=S.genre==='food'?FOOD_L1:BEAUTY_L1;
  if(S.path.length===0) return l1.map(([n,v])=>({name:n,vol:v,hasChildren:true}));
  if(S.path.length===1){
    return getL2(S.path[0]).map(([n,v])=>({name:n,vol:v,hasChildren:true}));
  }
  if(S.path.length===2){
    return getL3(S.path[0],S.path[1]).map(([n,v])=>({name:n,vol:v,hasChildren:false}));
  }
  return [];
}

function pmult(){return{  '1w':0.12,'1m':0.35,'3m':0.65,'6m':0.82,'1y':1.0}[S.period]||1}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n+''}

/* === 動画生成(10M+再生含む、リンク付き) === */
function genVideos(kw,count=40){
  const ps=S.platform==='both'?['tiktok','instagram']:[S.platform];
  const g=S.genre;
  const rng=seed(kw+S.period+'vid');
  const vids=[];
  for(let i=0;i<count;i++){
    const p=ps[i%ps.length];
    // 上位数本は1000万〜1億再生
    let views;
    if(i<3) views=Math.floor(rng()*90000000)+10000000;
    else if(i<8) views=Math.floor(rng()*9000000)+1000000;
    else if(i<20) views=Math.floor(rng()*900000)+100000;
    else views=Math.floor(rng()*90000)+10000;
    const likes=Math.floor(views*(rng()*0.1+0.02));
    const comments=Math.floor(likes*(rng()*0.08+0.005));
    const shares=Math.floor(comments*(rng()*3+0.5));
    const days=Math.floor(rng()*365);
    const d=new Date();d.setDate(d.getDate()-days);
    const vid=Math.floor(rng()*9e15)+1e15;
    const uid=Math.floor(rng()*9e8)+1e8;
    const url=p==='tiktok'
      ?'https://www.tiktok.com/@user'+uid+'/video/'+vid
      :'https://www.instagram.com/reel/'+btoa(String(vid)).slice(0,11)+'/';
    const titles=g==='food'
      ?["これ知らない人損してる","マジで神すぎた","全人類に届け","もっと早く知りたかった","今すぐ買って","毎日食べてる","100万回作った","コスパ最強","プロが教える","バズりすぎ注意"]
      :["整形級に変わる","垢抜け確定","マジで人生変わった","全女子に届け","これ以外使えない","プロ直伝","1000円以下で神","一生リピ","毎朝これだけ","ガチで最強"];
    vids.push({
      id:'v'+i,title:'【'+kw+'】'+titles[i%titles.length],platform:p,
      views,likes,comments,shares,
      date:d.toISOString().slice(0,10),days,
      er:((likes+comments)/views*100).toFixed(2),
      account:'@'+(g==='food'?'food':'beauty')+'_'+Math.floor(rng()*9999),
      duration:Math.floor(rng()*170)+10,
      url,keywords:[kw]
    });
  }
  return vids.sort((a,b)=>b.views-a.views);
}

function genAccounts(kw,count=30){
  const ps=S.platform==='both'?['tiktok','instagram']:[S.platform];
  const g=S.genre;
  const rng=seed(kw+S.period+'acc');
  const accs=[];
  for(let i=0;i<count;i++){
    const p=ps[i%ps.length];
    const f=Math.floor(rng()*3000000)+500;
    const gr=(rng()*50-5).toFixed(1);
    const uid=Math.floor(rng()*9e8)+1e8;
    const url=p==='tiktok'?'https://www.tiktok.com/@user'+uid:'https://www.instagram.com/user'+uid+'/';
    accs.push({
      name:(g==='food'?'グルメ':'美容')+'クリエイター'+(i+1),
      handle:'@'+(g==='food'?'food':'beauty')+'_'+Math.floor(rng()*9999),
      platform:p,followers:f,growth:parseFloat(gr),
      avgViews:Math.floor(f*(rng()*0.4+0.03)),
      er:(rng()*9+0.5).toFixed(2),
      posts:Math.floor(rng()*800)+5,
      url,keyword:kw
    });
  }
  return accs.sort((a,b)=>b.growth-a.growth);
}

  el.innerHTML=h;
}

function renderStats(){
  const data=getDataAtPath();
  const el=document.getElementById('statsBar');
  el.innerHTML=`<span>表示中: <span class="num">${data.length}件</span></span><span>ジャンル: <span class="num">${S.genre==='food'?'食品':'美容'}</span></span><span>階層: <span class="num">Lv${S.path.length+1}</span></span><span>期間: <span class="num">${S.period}</span></span>`;
}

function renderMap(){
  const grid=document.getElementById('grid');
  const data=getDataAtPath();
  if(!data.length){grid.innerHTML='<div style="padding:40px;color:#8b949e">データなし</div>';return}
  const m=pmult();
  const mx=Math.max(...data.map(d=>d.vol));
  const cls=S.genre==='food'?'food':'beauty';
  let h='';
  data.forEach(d=>{
    const v=Math.floor(d.vol*m);
    const pct=(d.vol/mx*100).toFixed(0);
    const vc=v>50000?'high':v>10000?'mid':'low';
    const lv=S.path.length;
    const esc=d.name.replace(/'/g,"\\'");
    const click=d.hasChildren?`drillDown('${esc}')`:`showKW('${esc}',${v})`;
    h+=`<div class="node-card ${cls}" onclick="${click}">
      <span class="node-badge">Lv${lv+1}</span>
      <div class="node-name">${d.name}</div>
      <div class="node-volume ${vc}">${fmt(v)}</div>
      <div class="node-bar"><div class="node-bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="node-hint">${d.hasChildren?'▶ 50件の子キーワード':'📊 詳細を見る'}</div>
    </div>`;
  });
  grid.innerHTML=h;
}

function renderAccs(){

  document.getElementById('aTitle').textContent=`「${kw}」の注目アカウント`;

function render(){
  document.getElementById('mapArea').classList.toggle('hidden',S.view!=='map');
  document.getElementById('vidArea').classList.toggle('hidden',S.view!=='vid');
  document.getElementById('accArea').classList.toggle('hidden',S.view!=='acc');
  renderBC();renderStats();
  if(S.view==='map')renderMap();
  else if(S.view==='vid')renderVids();
  else renderAccs();
}

function nav(i){S.path=i<0?[]:S.path.slice(0,i+1);render()}

}
function showKW(n,v){
  openP(n,`<div class="psec"><div class="psec-t">キーワード情報</div>
    <div class="pstat"><span class="pstat-l">ボリューム</span><span class="pstat-v">${fmt(v)}</span></div>
    <div class="pstat"><span class="pstat-l">ジャンル</span><span class="pstat-v">${S.genre==='food'?'食品':'美容'}</span></div>
    <div class="pstat"><span class="pstat-l">階層</span><span class="pstat-v">Lv${S.path.length+1}</span></div>
    <div class="pstat"><span class="pstat-l">競合度</span><span class="pstat-v">${v>30000?'高':v>10000?'中':'低'}</span></div></div>
    <div class="psec"><div class="psec-t">パス</div><div class="ptags">${S.path.map(p=>`<span class="ptag">${p}</span>`).join('')}<span class="ptag">${n}</span></div></div>`);
}
function showVid(v){
  openP('動画詳細',`<div class="psec"><div class="psec-t">動画情報</div>
    <div style="font-size:13px;color:#e0e0e0;margin-bottom:8px">${v.title}</div>
    <div class="pstat"><span class="pstat-l">URL</span><span class="pstat-v"><a href="${v.url}" target="_blank" style="color:#58a6ff">${v.platform==='tiktok'?'TikTok':'Instagram'}で見る</a></span></div>
    <div class="pstat"><span class="pstat-l">再生数</span><span class="pstat-v">${fmt(v.views)}</span></div>
    <div class="pstat"><span class="pstat-l">いいね</span><span class="pstat-v">${fmt(v.likes)}</span></div>
    <div class="pstat"><span class="pstat-l">コメント</span><span class="pstat-v">${fmt(v.comments)}</span></div>
    <div class="pstat"><span class="pstat-l">シェア</span><span class="pstat-v">${fmt(v.shares)}</span></div>
    <div class="pstat"><span class="pstat-l">ER</span><span class="pstat-v">${v.er}%</span></div>
    <div class="pstat"><span class="pstat-l">投稿日</span><span class="pstat-v">${v.date}</span></div>
    <div class="pstat"><span class="pstat-l">長さ</span><span class="pstat-v">${v.duration}秒</span></div></div>
    <div class="psec"><div class="psec-t">アカウント</div><div style="font-size:14px;font-weight:600;color:#58a6ff">${v.account}</div></div>`);
}
function showAcc(a){
  openP(a.name,`<div class="psec"><div class="psec-t">アカウント情報</div>
    <div class="pstat"><span class="pstat-l">URL</span><span class="pstat-v"><a href="${a.url}" target="_blank" style="color:#58a6ff">プロフィールを見る</a></span></div>
    <div class="pstat"><span class="pstat-l">フォロワー</span><span class="pstat-v">${fmt(a.followers)}</span></div>
    <div class="pstat"><span class="pstat-l">成長率</span><span class="pstat-v" style="color:${a.growth>=0?'#3fb950':'#f85149'}">${a.growth>=0?'+':''}${a.growth}%</span></div>
    <div class="pstat"><span class="pstat-l">平均再生</span><span class="pstat-v">${fmt(a.avgViews)}</span></div>
    <div class="pstat"><span class="pstat-l">平均ER</span><span class="pstat-v">${a.er}%</span></div>
    <div class="pstat"><span class="pstat-l">投稿数</span><span class="pstat-v">${a.posts}</span></div></div>`);
}

/* === トグル === */
function setupTgl(id,key){
  document.getElementById(id).querySelectorAll('.toggle-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.getElementById(id).querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');S[key]=b.dataset.value;closeP();render();
    });
  });
}
setupTgl('gT','genre');setupTgl('pT','platform');setupTgl('dT','period');setupTgl('vT','view');

render();
</script>
