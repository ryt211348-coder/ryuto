<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">

<title>SNS Research Tool - マインドマップ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f2f5;color:#333;overflow:hidden;height:100vh}
.toolbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap;z-index:20;position:relative}
.toolbar .logo{font-size:16px;font-weight:700;color:#4a6cf7}
.tg{display:flex;gap:1px;background:#e0e0e0;border-radius:6px;overflow:hidden}
.tg button{padding:4px 10px;border:none;background:#fff;color:#666;font-size:11px;cursor:pointer;transition:all .15s}
.tg button.on{background:#4a6cf7;color:#fff}
.tg button:hover:not(.on){background:#f0f0f0}
.canvas-wrap{position:relative;width:100%;height:calc(100vh - 42px);overflow:auto;cursor:grab}
.canvas-wrap:active{cursor:grabbing}
.canvas{position:relative;min-width:6000px;min-height:4000px}
svg.lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
svg.lines path{fill:none;stroke:#b0b8c4;stroke-width:1.5}
.nd{position:absolute;z-index:2;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:box-shadow .2s,transform .15s;user-select:none;border:1.5px solid transparent;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.nd:hover{transform:scale(1.05);z-index:10}
.nd.root{background:#4a6cf7;color:#fff;font-size:14px;font-weight:700;padding:10px 20px;border-radius:12px;box-shadow:0 4px 16px rgba(74,108,247,.3)}
.nd.lv1{background:#dce3ff;color:#2d3a8c;border-color:#b8c4ff}
.nd.lv1.open{background:#4a6cf7;color:#fff;border-color:#3451d1}
.nd.lv2{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;font-size:11px}
.nd.lv2.open{background:#43a047;color:#fff;border-color:#2e7d32}
.nd.lv3{background:#fff3e0;color:#e65100;border-color:#ffcc80;font-size:11px}
.nd .vol{font-size:9px;opacity:.7;margin-left:2px}
.nd .arrow{font-size:8px;margin-left:auto;opacity:.6;transition:transform .2s}
.nd.open .arrow{transform:rotate(90deg)}
.info{position:fixed;bottom:12px;left:12px;background:#fff;border-radius:8px;padding:8px 14px;font-size:11px;color:#666;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:20}
.info b{color:#4a6cf7}
.zoom-ctrl{position:fixed;bottom:12px;right:12px;display:flex;gap:4px;z-index:20}
.zoom-ctrl button{width:32px;height:32px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-ctrl button:hover{background:#f0f0f0}
.vcard4{position:absolute;z-index:3;width:280px;background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);font-size:11px}
.vcard4 .vhead{display:flex;gap:8px;padding:8px;border-bottom:1px solid #eee;align-items:center}
.vcard4 .vthumb{width:80px;height:80px;border-radius:6px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;position:relative}
.vcard4 .vthumb img{width:100%;height:100%;object-fit:cover}
.vcard4 .vthumb .rank{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700}
.vcard4 .vright{display:flex;flex-direction:column;gap:3px;min-width:0}
.vcard4 .vtitle4{font-weight:600;color:#333;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcard4 .vtitle4 a{color:#4a6cf7;text-decoration:none}
.vcard4 .vtitle4 a:hover{text-decoration:underline}
.vcard4 .vstat{color:#888;font-size:10px;display:flex;gap:6px;flex-wrap:wrap}
.vcard4 .vstat b{color:#333}
.vcard4 .vaccinfo{padding:4px 8px;background:#f8f9fa;border-bottom:1px solid #eee;display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:#666}
.vcard4 .vaccinfo b{color:#4a6cf7}
.vcard4 .vtranscript{padding:6px 8px;font-size:10px;color:#555;line-height:1.5;max-height:60px;overflow-y:auto;border-bottom:1px solid #eee;background:#fafbfc}
.vcard4 .vlink{display:block;padding:4px 8px;text-align:center;color:#4a6cf7;font-weight:600;font-size:11px;text-decoration:none;background:#f0f4ff}
.vcard4 a:hover{filter:brightness(0.95)}
</style>

/* === 状態 === */
let G='food',opened={};
function rng(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}
function getL2(n){
  const m=G==='food'?FL2:BL2;
  if(m[n]) return m[n].map((w,i)=>[w,Math.floor(rng(n+w)*80+5)]);
  const ms=G==='food'?FM:BM;
  return ms.map((w,i)=>[n+"×"+w,Math.floor(rng(n+w+'x')*60+5)]);
}
function getL3(p,n){
  const ms=G==='food'?FM:BM;
  return ms.map((w,i)=>[n+" "+w,Math.floor(rng(p+n+w+'3')*40+2)]);
}

/* === Lv4: サーバーAPIからリアルデータ取得 === */
const API_BASE=location.hostname==='localhost'||location.hostname==='127.0.0.1'?'':'';
async function fetchRealVideos(keyword){
  const plat=document.querySelector('#pT .on')?.dataset.v||'both';
  const per=document.querySelector('#dT .on')?.dataset.v||'1m';
  try{
    const r=await fetch(`/api/research/search?keyword=${encodeURIComponent(keyword)}&platform=${plat}&period=${per}&count=10`);
    if(!r.ok) throw new Error('API error');
    const data=await r.json();
    return data.videos||[];
  }catch(e){
    console.error('API fetch failed:',e);
    return null;
  }
}
function genL4Links(keyword){
  const encoded=encodeURIComponent(keyword);
  const tag=keyword.replace(/[\s×・]/g,'');
  return {
    tiktokSearch:'https://www.tiktok.com/search?q='+encoded,
    tiktokTag:'https://www.tiktok.com/tag/'+encodeURIComponent(tag),
    instaTag:'https://www.instagram.com/explore/tags/'+encodeURIComponent(tag)+'/',
    instaSearch:'https://www.instagram.com/explore/search/keyword/?q='+encoded,
  };
}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n+''}

/* === 描画 === */
const canvas=document.getElementById('canvas');
const svg=document.getElementById('svg');
let nodes=[],lines=[];
const NW=160,NH=28,GAP=6,COL_GAP=60;

function clear(){canvas.querySelectorAll('.nd,.vcard4').forEach(e=>e.remove());svg.innerHTML='';nodes=[];lines=[]}

function addNode(id,text,vol,x,y,lv,parentId){
  const d=document.createElement('div');
  d.className='nd lv'+lv+(opened[id]?' open':'');
  d.id='n_'+id;
  d.style.left=x+'px';d.style.top=y+'px';
  const volStr=vol>=100?(vol/10).toFixed(0)+'万':vol+'K';
  d.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis">${text}</span><span class="vol">${volStr}</span><span class="arrow">▶</span>`;
  d.onclick=(e)=>{e.stopPropagation();toggle(id,lv,text)};
  canvas.appendChild(d);
  nodes.push({id,x,y,w:NW,h:NH,parentId,el:d});
  return d;
}

function drawLine(x1,y1,x2,y2){
  const mx=(x1+x2)/2;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
  svg.appendChild(path);
}

function build(){
  clear();
  const l1=G==='food'?FL:BL;
  const rootX=80,rootY=l1.length*(NH+GAP)/2;
  // ルートノード
  const rd=document.createElement('div');
  rd.className='nd root';rd.style.left=rootX+'px';rd.style.top=rootY+'px';
  rd.textContent=G==='food'?'🍱 食品':'💄 美容';
  canvas.appendChild(rd);

  const col1X=rootX+NW+COL_GAP;
  let nodeCount=1;
  l1.forEach(([name,vol],i)=>{
    const y=i*(NH+GAP)+20;
    const id='l1_'+i;
    addNode(id,name,vol,col1X,y,1,null);
    drawLine(rootX+NW-10,rootY+NH/2,col1X,y+NH/2);
    nodeCount++;

    if(opened[id]){
      const kids=getL2(name);
      const col2X=col1X+NW+COL_GAP;
      const startY2=Math.max(0,y-kids.length*(NH+GAP)/4);
      kids.forEach(([kn,kv],j)=>{
        const ky=startY2+j*(NH+GAP);
        const kid='l2_'+i+'_'+j;
        addNode(kid,kn,kv,col2X,ky,2,id);
        drawLine(col1X+NW,y+NH/2,col2X,ky+NH/2);
        nodeCount++;

        if(opened[kid]){
          const gkids=getL3(name,kn);
          const col3X=col2X+NW+COL_GAP;
          const startY3=Math.max(0,ky-gkids.length*(NH+GAP)/4);
          const VCARD_H=220,VCARD_W=280,VGAP=8;
          gkids.forEach(([gn,gv],k)=>{
            const gy=startY3+k*(NH+GAP);
            const l3id='l3_'+i+'_'+j+'_'+k;
            addNode(l3id,gn,gv,col3X,gy,3,kid);
            drawLine(col2X+NW,ky+NH/2,col3X,gy+NH/2);
            nodeCount++;
            if(opened[l3id]){
              const col4X=col3X+NW+COL_GAP;
              // Lv4: ローディングカード表示 → APIから実データ取得
              const loadCard=document.createElement('div');
              loadCard.className='vcard4';
              loadCard.id='lv4_'+l3id;
              loadCard.style.left=col4X+'px';loadCard.style.top=(gy-30)+'px';loadCard.style.width='320px';
              loadCard.innerHTML='<div style="padding:20px;text-align:center;color:#888"><div style="font-size:24px;margin-bottom:8px">⏳</div>「'+gn+'」の動画を検索中...</div>';
              canvas.appendChild(loadCard);
              drawLine(col3X+NW,gy+NH/2,col4X,gy-30+40);
              nodeCount++;
              // 非同期でAPIから取得
              (async(cardEl,gnStr,gyPos)=>{
                const vids=await fetchRealVideos(gnStr);
                if(!document.getElementById(cardEl.id))return;
                const links=genL4Links(gnStr);
                if(vids&&vids.length>0){
                  let h='<div style="padding:8px 10px;border-bottom:1px solid #eee;font-weight:700;font-size:12px;color:#4a6cf7">🔥「'+gnStr+'」上位'+vids.length+'動画（実データ）</div>';
                  vids.forEach((v,vi)=>{
                    const thumb=v.thumbnail?`<img src="${v.thumbnail}" style="width:70px;height:70px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">`:`<div style="width:70px;height:70px;background:#eee;border-radius:4px;display:flex;align-items:center;justify-content:center">🎬</div>`;
                    h+=`<div style="display:flex;gap:8px;padding:8px 10px;border-bottom:1px solid #f0f0f0">
                      <div style="flex-shrink:0;position:relative">${thumb}<span style="position:absolute;top:2px;left:2px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px">#${vi+1}</span></div>
                      <div style="min-width:0">
                        <div style="font-size:11px;font-weight:600;margin-bottom:3px"><a href="${v.url}" target="_blank" style="color:#4a6cf7;text-decoration:none">${v.title||'動画を見る'}</a></div>
                        <div style="font-size:10px;color:#666;display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px"><span>👁${fmt(v.views)}</span><span>❤️${fmt(v.likes)}</span><span>💬${fmt(v.comments)}</span><span>${v.duration}秒</span></div>
                        <div style="font-size:10px;color:#888">${v.upload_date||''} · <span style="color:#4a6cf7">${v.account?.name||''}</span> ${v.account?.followers?'('+fmt(v.account.followers)+'フォロワー)':''}</div>
                      </div>
                    </div>`;
                  });
                  h+='<a href="'+links.tiktokSearch+'" target="_blank" style="display:block;padding:6px;text-align:center;color:#4a6cf7;font-size:11px;font-weight:600;background:#f0f4ff;text-decoration:none">もっと見る →</a>';
                  cardEl.innerHTML=h;
                }else{
                  // APIが使えない場合はリンクカードにフォールバック
                  cardEl.innerHTML=`<div style="padding:10px;border-bottom:1px solid #eee"><div style="font-weight:700;font-size:13px;color:#333;margin-bottom:6px">🔍「${gnStr}」の動画を検索</div><div style="font-size:11px;color:#888;margin-bottom:4px">※サーバー未接続のためリンクを表示</div></div>
                  <a href="${links.tiktokSearch}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid #eee;background:#f0fffe;color:#333;text-decoration:none"><span style="font-size:20px">🎵</span><div><div style="font-weight:600">TikTokで検索</div><div style="font-size:10px;color:#69c9d0">「${gnStr}」の人気動画 →</div></div></a>
                  <a href="${links.tiktokTag}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid #eee;background:#f8f8ff;color:#333;text-decoration:none"><span style="font-size:20px">#️⃣</span><div><div style="font-weight:600">TikTok #タグ</div><div style="font-size:10px;color:#69c9d0">#${gnStr.replace(/[\\s×・]/g,'')} →</div></div></a>
                  <a href="${links.instaTag}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;background:#fff5f8;color:#333;text-decoration:none"><span style="font-size:20px">📸</span><div><div style="font-weight:600">Instagram #タグ</div><div style="font-size:10px;color:#e1306c">#${gnStr.replace(/[\\s×・]/g,'')} →</div></div></a>`;
                }
                // カードサイズに応じてキャンバスリサイズ
                const allEl=canvas.querySelectorAll('.nd,.vcard4');
                let mx2=0,my2=0;
                allEl.forEach(n2=>{mx2=Math.max(mx2,parseInt(n2.style.left)+400);my2=Math.max(my2,parseInt(n2.style.top)+n2.offsetHeight+50)});
                canvas.style.minWidth=Math.max(3000,mx2)+'px';
                canvas.style.minHeight=Math.max(2000,my2)+'px';
              })(loadCard,gn,gy);
              canvas.appendChild(card);
              drawLine(col3X+NW,gy+NH/2,col4X,gy-30+CARD_H/2);
              nodeCount++;
            }
          });
        }
      });
    }
  });
  // キャンバスサイズ調整
  const allN=canvas.querySelectorAll('.nd,.vcard4');
  let maxX=0,maxY=0;
  allN.forEach(n=>{maxX=Math.max(maxX,parseInt(n.style.left)+350);maxY=Math.max(maxY,parseInt(n.style.top)+250)});
  canvas.style.minWidth=Math.max(3000,maxX+200)+'px';
  canvas.style.minHeight=Math.max(2000,maxY+200)+'px';
  svg.setAttribute('width',canvas.style.minWidth);
  svg.setAttribute('height',canvas.style.minHeight);
  document.getElementById('info').innerHTML='ノード: <b>'+nodeCount+'</b>';
}

function toggle(id,lv,name){
  if(opened[id]){
    // 閉じる: この配下の展開も全て閉じる
    const prefix=id+'_';
    Object.keys(opened).forEach(k=>{if(k===id||k.startsWith(prefix))delete opened[k]});
    // l1閉じたらl2,l3も閉じる
    if(id.startsWith('l1_')){
      const idx=id.split('_')[1];
      Object.keys(opened).forEach(k=>{if(k.startsWith('l2_'+idx+'_')||k.startsWith('l3_'+idx+'_'))delete opened[k]});
    }
    if(id.startsWith('l2_')){
      const parts=id.split('_');
      Object.keys(opened).forEach(k=>{if(k.startsWith('l3_'+parts[1]+'_'+parts[2]+'_'))delete opened[k]});
    }
    delete opened[id];
  }else{
    opened[id]=true;
  }
  build();
}

/* === ズーム === */
let scale=1;
function applyZoom(){canvas.style.transform='scale('+scale+')';canvas.style.transformOrigin='0 0'}
function zoomIn(){scale=Math.min(2,scale+0.15);applyZoom()}
function zoomOut(){scale=Math.max(0.2,scale-0.15);applyZoom()}
function zoomReset(){scale=1;applyZoom()}

/* === トグルボタン === */
function setupTg(id,cb){
  document.getElementById(id).querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{
      document.getElementById(id).querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');cb(b.dataset.v);
    };
  });
}
setupTg('gT',v=>{G=v;opened={};build()});
setupTg('pT',v=>{});
setupTg('dT',v=>{});

build()
