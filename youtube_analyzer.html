<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube チャンネル分析ツール - ショート / 長尺 別</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #aaa; font-size: 14px; }

        /* API Key Section */
        .api-key-section {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .api-key-section summary {
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
        }
        .api-key-section summary:hover { color: #fff; }
        .api-key-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
        }
        .api-key-row input {
            flex: 1;
            padding: 10px 14px;
            background: #16213e;
            border: 1px solid #444;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
        }
        .api-key-row button {
            padding: 10px 20px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .api-key-row button:hover { background: #cc0000; }
        .api-key-status {
            margin-top: 8px;
            font-size: 12px;
            color: #4caf50;
        }
        .api-key-help {
            margin-top: 12px;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }
        .api-key-help a { color: #4fc3f7; }

        /* Input Section */
        .input-section {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .input-row {
            display: flex;
            gap: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 14px 18px;
            background: #16213e;
            border: 1px solid #444;
            border-radius: 10px;
            color: #f1f1f1;
            font-size: 16px;
        }
        .input-row input:focus { outline: none; border-color: #ff0000; }
        .input-row button {
            padding: 14px 32px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
        }
        .input-row button:hover { background: #cc0000; }
        .input-row button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-section {
            display: none;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        .progress-bar-container {
            background: #16213e;
            border-radius: 8px;
            height: 8px;
            margin: 16px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            border-radius: 8px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text { color: #aaa; font-size: 14px; }

        /* Results */
        .results-section { display: none; }

        /* Channel Info */
        .channel-info {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .channel-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .channel-details h2 { font-size: 22px; margin-bottom: 4px; }
        .channel-details .meta { color: #aaa; font-size: 14px; }
        .channel-details .meta span { margin-right: 16px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
        }
        .stat-card .sub { font-size: 12px; color: #888; margin-top: 4px; }
        .color-red { color: #ff4444; }
        .color-blue { color: #4fc3f7; }
        .color-green { color: #4caf50; }
        .color-yellow { color: #ffeb3b; }
        .color-purple { color: #ce93d8; }
        .color-orange { color: #ff9800; }

        /* Comparison Table */
        .comparison-section {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .comparison-section h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }
        .comparison-table th, .comparison-table td {
            padding: 12px 16px;
            text-align: right;
            border-bottom: 1px solid #2a2a3e;
        }
        .comparison-table th {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .comparison-table th:first-child,
        .comparison-table td:first-child {
            text-align: left;
        }
        .comparison-table tr:last-child td { border-bottom: none; }
        .type-shorts { color: #ff4444; font-weight: bold; }
        .type-long { color: #4fc3f7; font-weight: bold; }
        .type-total { color: #4caf50; font-weight: bold; }

        /* Monthly Table */
        .monthly-section {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .monthly-section h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .monthly-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .monthly-table th, .monthly-table td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid #2a2a3e;
        }
        .monthly-table th {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            background: #1a1a2e;
        }
        .monthly-table th:first-child,
        .monthly-table td:first-child {
            text-align: left;
        }
        .monthly-table-wrapper {
            max-height: 500px;
            overflow-y: auto;
        }

        /* Bar chart */
        .bar-section {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .bar-section h3 { font-size: 18px; margin-bottom: 16px; }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .bar-label {
            width: 80px;
            text-align: right;
            margin-right: 12px;
            color: #aaa;
            flex-shrink: 0;
        }
        .bar-track {
            flex: 1;
            height: 24px;
            background: #16213e;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
        }
        .bar-fill-shorts {
            height: 100%;
            background: #ff4444;
            transition: width 0.5s;
        }
        .bar-fill-long {
            height: 100%;
            background: #4fc3f7;
            transition: width 0.5s;
        }
        .bar-value {
            width: 100px;
            text-align: right;
            margin-left: 12px;
            color: #aaa;
            flex-shrink: 0;
            font-size: 12px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Error */
        .error-msg {
            background: #2a1a1a;
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 16px;
            color: #ff6666;
            margin-bottom: 24px;
            display: none;
        }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .channel-info { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .bar-label { width: 60px; font-size: 11px; }
            .bar-value { width: 80px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YouTube チャンネル分析ツール</h1>
            <p>ショート動画 / 長尺動画 の再生回数・投稿数を分けて分析</p>
        </div>

        <!-- API Key -->
        <details class="api-key-section" id="apiKeySection">
            <summary>YouTube Data API キー設定</summary>
            <div class="api-key-row">
                <input type="password" id="apiKeyInput" placeholder="YouTube Data API v3 キーを入力">
                <button onclick="saveApiKey()">保存</button>
            </div>
            <div class="api-key-status" id="apiKeyStatus"></div>
            <div class="api-key-help">
                <strong>無料で取得できます：</strong><br>
                1. <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a> にログイン<br>
                2. プロジェクトを作成 → 「APIとサービス」→「ライブラリ」<br>
                3. 「YouTube Data API v3」を有効化<br>
                4. 「認証情報」→「APIキーを作成」<br>
                ※ クレジットカード不要・完全無料（1日10,000クオータ）
            </div>
        </details>

        <!-- Input -->
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="channelUrl" placeholder="YouTubeチャンネルのURLを入力（例: https://www.youtube.com/@ChannelName）">
                <button id="analyzeBtn" onclick="startAnalysis()">分析開始</button>
            </div>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-text" id="progressText">分析を開始しています...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection">
            <!-- Channel Info -->
            <div class="channel-info" id="channelInfo"></div>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Comparison -->
            <div class="comparison-section">
                <h3>ショート vs 長尺 比較</h3>
                <table class="comparison-table" id="comparisonTable"></table>
            </div>

            <!-- Monthly Bar Chart -->
            <div class="bar-section">
                <h3>月別 再生回数（ショート / 長尺）</h3>
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#ff4444"></div>ショート</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#4fc3f7"></div>長尺</div>
                </div>
                <div id="barChart"></div>
            </div>

            <!-- Monthly Detail Table -->
            <div class="monthly-section">
                <h3>月別 詳細データ</h3>
                <div class="monthly-table-wrapper">
                    <table class="monthly-table" id="monthlyTable"></table>
                </div>
            </div>
        </div>
    </div>

<script>
// ---- API Key Management ----
function getApiKey() {
    return localStorage.getItem('yt_api_key') || '';
}

function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('yt_api_key', key);
    document.getElementById('apiKeyStatus').textContent = '保存しました';
    document.getElementById('apiKeyInput').value = '';
    checkApiKey();
}

function checkApiKey() {
    const key = getApiKey();
    const status = document.getElementById('apiKeyStatus');
    const details = document.getElementById('apiKeySection');
    if (key) {
        status.textContent = 'APIキー設定済み (' + key.substring(0, 8) + '...)';
        details.removeAttribute('open');
    } else {
        status.textContent = '';
        details.setAttribute('open', '');
    }
}

// ---- YouTube API Helpers ----
async function ytApi(endpoint, params) {
    const key = getApiKey();
    if (!key) throw new Error('APIキーが設定されていません。上の設定欄からキーを入力してください。');
    const url = new URL('https://www.googleapis.com/youtube/v3/' + endpoint);
    params.key = key;
    for (const [k, v] of Object.entries(params)) {
        url.searchParams.set(k, v);
    }
    const res = await fetch(url.toString());
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || res.statusText;
        throw new Error('API Error: ' + msg);
    }
    return res.json();
}

// Extract channel identifier from URL
function parseChannelUrl(url) {
    url = url.trim().replace(/\/+$/, '');
    // @handle format
    let m = url.match(/@([\w.-]+)/);
    if (m) return { type: 'handle', value: '@' + m[1] };
    // /channel/UCxxxx
    m = url.match(/\/channel\/(UC[\w-]+)/);
    if (m) return { type: 'id', value: m[1] };
    // /c/name or /user/name
    m = url.match(/\/(c|user)\/([\w.-]+)/);
    if (m) return { type: 'forUsername', value: m[2] };
    // Could be just a handle or channel ID
    if (url.startsWith('UC') && url.length >= 24) return { type: 'id', value: url };
    return { type: 'handle', value: url.startsWith('@') ? url : '@' + url };
}

async function resolveChannelId(input) {
    const parsed = parseChannelUrl(input);

    if (parsed.type === 'id') {
        return parsed.value;
    }

    if (parsed.type === 'handle') {
        // Use channels.list with forHandle
        try {
            const data = await ytApi('channels', { part: 'id', forHandle: parsed.value.replace('@', '') });
            if (data.items && data.items.length > 0) return data.items[0].id;
        } catch (e) { /* fallback to search */ }

        // Fallback: search
        const data = await ytApi('search', { part: 'snippet', q: parsed.value, type: 'channel', maxResults: '1' });
        if (data.items && data.items.length > 0) return data.items[0].snippet.channelId;
        throw new Error('チャンネルが見つかりません: ' + parsed.value);
    }

    if (parsed.type === 'forUsername') {
        const data = await ytApi('channels', { part: 'id', forUsername: parsed.value });
        if (data.items && data.items.length > 0) return data.items[0].id;
        throw new Error('チャンネルが見つかりません: ' + parsed.value);
    }
}

async function getChannelInfo(channelId) {
    const data = await ytApi('channels', {
        part: 'snippet,statistics,contentDetails',
        id: channelId
    });
    if (!data.items || data.items.length === 0) throw new Error('チャンネル情報を取得できません');
    return data.items[0];
}

// Fetch all video IDs from uploads playlist
async function getAllVideoIds(uploadsPlaylistId, progressCb) {
    const ids = [];
    let pageToken = '';
    let page = 0;
    do {
        const params = { part: 'contentDetails', playlistId: uploadsPlaylistId, maxResults: '50' };
        if (pageToken) params.pageToken = pageToken;
        const data = await ytApi('playlistItems', params);
        for (const item of data.items || []) {
            ids.push(item.contentDetails.videoId);
        }
        pageToken = data.nextPageToken || '';
        page++;
        if (progressCb) progressCb(ids.length, data.pageInfo?.totalResults || ids.length);
    } while (pageToken);
    return ids;
}

// Fetch video details in batches of 50
async function getVideoDetails(videoIds, progressCb) {
    const videos = [];
    for (let i = 0; i < videoIds.length; i += 50) {
        const batch = videoIds.slice(i, i + 50);
        const data = await ytApi('videos', {
            part: 'snippet,contentDetails,statistics',
            id: batch.join(',')
        });
        for (const item of data.items || []) {
            videos.push(item);
        }
        if (progressCb) progressCb(videos.length, videoIds.length);
    }
    return videos;
}

// Parse ISO 8601 duration to seconds
function parseDuration(iso) {
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return 0;
    return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseInt(m[3] || 0);
}

function isShort(video) {
    const seconds = parseDuration(video.contentDetails.duration);
    // Shorts are 60 seconds or less
    return seconds > 0 && seconds <= 60;
}

function formatNumber(n) {
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '億';
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toLocaleString();
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
}

function getYearMonth(dateStr) {
    const d = new Date(dateStr);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// ---- UI ----
function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
}

function showProgress(text, pct) {
    const section = document.getElementById('progressSection');
    section.style.display = 'block';
    document.getElementById('progressText').textContent = text;
    document.getElementById('progressBar').style.width = pct + '%';
}

function hideProgress() {
    document.getElementById('progressSection').style.display = 'none';
}

async function startAnalysis() {
    const input = document.getElementById('channelUrl').value.trim();
    if (!input) { showError('チャンネルURLを入力してください'); return; }

    hideError();
    document.getElementById('resultsSection').style.display = 'none';
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '分析中...';

    try {
        // Step 1: Resolve channel
        showProgress('チャンネルを検索中...', 5);
        const channelId = await resolveChannelId(input);

        // Step 2: Get channel info
        showProgress('チャンネル情報を取得中...', 10);
        const channelData = await getChannelInfo(channelId);

        const uploadsPlaylistId = channelData.contentDetails.relatedPlaylists.uploads;
        const stats = channelData.statistics;
        const snippet = channelData.snippet;

        // Step 3: Get all video IDs
        showProgress('動画一覧を取得中...', 15);
        const videoIds = await getAllVideoIds(uploadsPlaylistId, (fetched, total) => {
            const pct = 15 + (fetched / Math.max(total, 1)) * 35;
            showProgress(`動画一覧を取得中... (${fetched}/${total})`, pct);
        });

        if (videoIds.length === 0) {
            throw new Error('動画が見つかりません');
        }

        // Step 4: Get video details
        showProgress('動画の詳細を取得中...', 50);
        const videos = await getVideoDetails(videoIds, (fetched, total) => {
            const pct = 50 + (fetched / Math.max(total, 1)) * 40;
            showProgress(`動画の詳細を取得中... (${fetched}/${total})`, pct);
        });

        // Step 5: Analyze
        showProgress('データを分析中...', 95);
        const result = analyzeVideos(videos, channelData);

        // Step 6: Render
        showProgress('完了！', 100);
        renderResults(result);

    } catch (e) {
        showError(e.message);
    } finally {
        hideProgress();
        btn.disabled = false;
        btn.textContent = '分析開始';
    }
}

function analyzeVideos(videos, channelData) {
    const snippet = channelData.snippet;
    const stats = channelData.statistics;

    const shorts = [];
    const longs = [];

    for (const v of videos) {
        const info = {
            id: v.id,
            title: v.snippet.title,
            publishedAt: v.snippet.publishedAt,
            views: parseInt(v.statistics?.viewCount || 0),
            likes: parseInt(v.statistics?.likeCount || 0),
            comments: parseInt(v.statistics?.commentCount || 0),
            duration: parseDuration(v.contentDetails.duration),
            yearMonth: getYearMonth(v.snippet.publishedAt),
        };

        if (isShort(v)) {
            shorts.push(info);
        } else {
            longs.push(info);
        }
    }

    // Find first video date
    const allVideos = [...shorts, ...longs].sort((a, b) => new Date(a.publishedAt) - new Date(b.publishedAt));
    const firstVideoDate = allVideos.length > 0 ? allVideos[0].publishedAt : null;

    // Monthly breakdown
    const monthlyMap = {};
    for (const v of shorts) {
        if (!monthlyMap[v.yearMonth]) monthlyMap[v.yearMonth] = { shortsViews: 0, longsViews: 0, shortsCount: 0, longsCount: 0 };
        monthlyMap[v.yearMonth].shortsViews += v.views;
        monthlyMap[v.yearMonth].shortsCount++;
    }
    for (const v of longs) {
        if (!monthlyMap[v.yearMonth]) monthlyMap[v.yearMonth] = { shortsViews: 0, longsViews: 0, shortsCount: 0, longsCount: 0 };
        monthlyMap[v.yearMonth].longsViews += v.views;
        monthlyMap[v.yearMonth].longsCount++;
    }

    const months = Object.keys(monthlyMap).sort().reverse();
    const monthly = months.map(m => ({ month: m, ...monthlyMap[m] }));

    const totalShortsViews = shorts.reduce((s, v) => s + v.views, 0);
    const totalLongsViews = longs.reduce((s, v) => s + v.views, 0);

    // Last 30 days
    const now = new Date();
    const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
    const recentShorts = shorts.filter(v => new Date(v.publishedAt) >= thirtyDaysAgo);
    const recentLongs = longs.filter(v => new Date(v.publishedAt) >= thirtyDaysAgo);
    const recentShortsViews = recentShorts.reduce((s, v) => s + v.views, 0);
    const recentLongsViews = recentLongs.reduce((s, v) => s + v.views, 0);

    return {
        channel: {
            title: snippet.title,
            description: snippet.description,
            thumbnail: snippet.thumbnails?.medium?.url || snippet.thumbnails?.default?.url || '',
            subscribers: parseInt(stats.subscriberCount || 0),
            totalViews: parseInt(stats.viewCount || 0),
            totalVideos: parseInt(stats.videoCount || 0),
            publishedAt: snippet.publishedAt,
        },
        firstVideoDate,
        shorts: { count: shorts.length, totalViews: totalShortsViews, avgViews: shorts.length ? Math.round(totalShortsViews / shorts.length) : 0 },
        longs: { count: longs.length, totalViews: totalLongsViews, avgViews: longs.length ? Math.round(totalLongsViews / longs.length) : 0 },
        recent: {
            shortsCount: recentShorts.length,
            longsCount: recentLongs.length,
            shortsViews: recentShortsViews,
            longsViews: recentLongsViews,
        },
        monthly,
    };
}

function renderResults(result) {
    const r = result;

    // Channel Info
    document.getElementById('channelInfo').innerHTML = `
        <img class="channel-avatar" src="${r.channel.thumbnail}" alt="">
        <div class="channel-details">
            <h2>${escHtml(r.channel.title)}</h2>
            <div class="meta">
                <span>登録者 ${formatNumber(r.channel.subscribers)}人</span>
                <span>総再生回数 ${formatNumber(r.channel.totalViews)}回</span>
                <span>動画数 ${r.channel.totalVideos.toLocaleString()}本</span>
            </div>
            <div class="meta" style="margin-top:4px">
                <span>チャンネル開設日 ${formatDate(r.channel.publishedAt)}</span>
                ${r.firstVideoDate ? '<span>初投稿日 ' + formatDate(r.firstVideoDate) + '</span>' : ''}
            </div>
        </div>
    `;

    // Stats Cards
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
            <div class="label">ショート動画 本数</div>
            <div class="value color-red">${r.shorts.count.toLocaleString()}</div>
            <div class="sub">直近30日: ${r.recent.shortsCount}本</div>
        </div>
        <div class="stat-card">
            <div class="label">長尺動画 本数</div>
            <div class="value color-blue">${r.longs.count.toLocaleString()}</div>
            <div class="sub">直近30日: ${r.recent.longsCount}本</div>
        </div>
        <div class="stat-card">
            <div class="label">ショート 総再生回数</div>
            <div class="value color-red">${formatNumber(r.shorts.totalViews)}</div>
            <div class="sub">平均 ${formatNumber(r.shorts.avgViews)}回/本</div>
        </div>
        <div class="stat-card">
            <div class="label">長尺 総再生回数</div>
            <div class="value color-blue">${formatNumber(r.longs.totalViews)}</div>
            <div class="sub">平均 ${formatNumber(r.longs.avgViews)}回/本</div>
        </div>
        <div class="stat-card">
            <div class="label">直近30日 ショート再生</div>
            <div class="value color-orange">${formatNumber(r.recent.shortsViews)}</div>
            <div class="sub">${r.recent.shortsCount}本投稿</div>
        </div>
        <div class="stat-card">
            <div class="label">直近30日 長尺再生</div>
            <div class="value color-purple">${formatNumber(r.recent.longsViews)}</div>
            <div class="sub">${r.recent.longsCount}本投稿</div>
        </div>
    `;

    // Comparison Table
    const totalAll = r.shorts.totalViews + r.longs.totalViews;
    const shortsPct = totalAll ? (r.shorts.totalViews / totalAll * 100).toFixed(1) : 0;
    const longsPct = totalAll ? (r.longs.totalViews / totalAll * 100).toFixed(1) : 0;
    document.getElementById('comparisonTable').innerHTML = `
        <thead>
            <tr><th>タイプ</th><th>動画数</th><th>総再生回数</th><th>再生割合</th><th>平均再生回数</th><th>直近30日投稿数</th><th>直近30日再生回数</th></tr>
        </thead>
        <tbody>
            <tr>
                <td class="type-shorts">ショート</td>
                <td>${r.shorts.count.toLocaleString()}</td>
                <td>${formatNumber(r.shorts.totalViews)}</td>
                <td>${shortsPct}%</td>
                <td>${formatNumber(r.shorts.avgViews)}</td>
                <td>${r.recent.shortsCount}</td>
                <td>${formatNumber(r.recent.shortsViews)}</td>
            </tr>
            <tr>
                <td class="type-long">長尺</td>
                <td>${r.longs.count.toLocaleString()}</td>
                <td>${formatNumber(r.longs.totalViews)}</td>
                <td>${longsPct}%</td>
                <td>${formatNumber(r.longs.avgViews)}</td>
                <td>${r.recent.longsCount}</td>
                <td>${formatNumber(r.recent.longsViews)}</td>
            </tr>
            <tr>
                <td class="type-total">合計</td>
                <td>${(r.shorts.count + r.longs.count).toLocaleString()}</td>
                <td>${formatNumber(totalAll)}</td>
                <td>100%</td>
                <td>${formatNumber(Math.round(totalAll / Math.max(r.shorts.count + r.longs.count, 1)))}</td>
                <td>${r.recent.shortsCount + r.recent.longsCount}</td>
                <td>${formatNumber(r.recent.shortsViews + r.recent.longsViews)}</td>
            </tr>
        </tbody>
    `;

    // Monthly Bar Chart (last 12 months)
    const chartMonths = r.monthly.slice(0, 12);
    const maxMonthlyViews = Math.max(...chartMonths.map(m => m.shortsViews + m.longsViews), 1);
    let barHtml = '';
    for (const m of chartMonths) {
        const total = m.shortsViews + m.longsViews;
        const shortsPctBar = total ? (m.shortsViews / maxMonthlyViews * 100) : 0;
        const longsPctBar = total ? (m.longsViews / maxMonthlyViews * 100) : 0;
        barHtml += `
            <div class="bar-row">
                <div class="bar-label">${m.month}</div>
                <div class="bar-track">
                    <div class="bar-fill-shorts" style="width:${shortsPctBar}%"></div>
                    <div class="bar-fill-long" style="width:${longsPctBar}%"></div>
                </div>
                <div class="bar-value">${formatNumber(total)}</div>
            </div>
        `;
    }
    document.getElementById('barChart').innerHTML = barHtml;

    // Monthly Detail Table
    let tableHtml = `
        <thead>
            <tr>
                <th>月</th>
                <th>ショート投稿数</th>
                <th>長尺投稿数</th>
                <th>合計投稿数</th>
                <th>ショート再生</th>
                <th>長尺再生</th>
                <th>合計再生</th>
            </tr>
        </thead>
        <tbody>
    `;
    for (const m of r.monthly) {
        tableHtml += `
            <tr>
                <td>${m.month}</td>
                <td class="type-shorts">${m.shortsCount}</td>
                <td class="type-long">${m.longsCount}</td>
                <td>${m.shortsCount + m.longsCount}</td>
                <td class="type-shorts">${formatNumber(m.shortsViews)}</td>
                <td class="type-long">${formatNumber(m.longsViews)}</td>
                <td>${formatNumber(m.shortsViews + m.longsViews)}</td>
            </tr>
        `;
    }
    tableHtml += '</tbody>';
    document.getElementById('monthlyTable').innerHTML = tableHtml;

    document.getElementById('resultsSection').style.display = 'block';
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Init
checkApiKey();
</script>
</body>
</html>
