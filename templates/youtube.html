<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube チャンネル動画タイプ別分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header .subtitle { color: #aaa; font-size: 0.95rem; }
        .nav-link {
            display: inline-block;
            margin-top: 12px;
            color: #3ea6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-link:hover { text-decoration: underline; }

        /* フォーム */
        .form-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #272727;
            border: 1px solid #444;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus { border-color: #ff4444; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #cc0000; }
        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* プログレス */
        .progress-section {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #333;
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-message { color: #aaa; font-size: 1.1rem; }

        /* 結果 */
        .results-section { display: none; }

        /* チャンネル概要 */
        .channel-overview {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
        }
        .channel-name {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }
        .stat-card {
            background: #272727;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .stat-value.red { color: #ff4444; }
        .stat-value.blue { color: #3ea6ff; }
        .stat-value.green { color: #2ba640; }
        .stat-value.orange { color: #ff8c00; }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        /* タイプ別集計 */
        .type-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .type-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
        }
        .type-card h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .type-card h3 .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-short { background: #ff4444; color: white; }
        .badge-long { background: #3ea6ff; color: white; }
        .type-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .type-stat:last-child { border-bottom: none; }
        .type-stat-label { color: #888; }
        .type-stat-value { font-weight: bold; }

        /* 月間テーブル */
        .monthly-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .monthly-section h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: right;
            border-bottom: 1px solid #2a2a2a;
            white-space: nowrap;
        }
        th {
            color: #888;
            font-size: 0.85rem;
            font-weight: normal;
            position: sticky;
            top: 0;
            background: #1a1a1a;
        }
        th:first-child, td:first-child { text-align: left; }
        tr:hover td { background: #222; }
        .views-short { color: #ff4444; }
        .views-long { color: #3ea6ff; }
        .count-short { color: #ff8888; }
        .count-long { color: #7ec8ff; }

        /* エラー */
        .error-message {
            display: none;
            background: #3a1a1a;
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 16px;
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
            color: #ff8888;
        }

        /* グラフ */
        .chart-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .chart-section h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bar-label {
            width: 80px;
            font-size: 0.85rem;
            color: #aaa;
            text-align: right;
            flex-shrink: 0;
        }
        .bar-container {
            flex: 1;
            display: flex;
            height: 28px;
            border-radius: 4px;
            overflow: hidden;
            background: #272727;
        }
        .bar-short {
            background: #ff4444;
            height: 100%;
            transition: width 0.5s ease;
        }
        .bar-long {
            background: #3ea6ff;
            height: 100%;
            transition: width 0.5s ease;
        }
        .bar-total {
            width: 100px;
            font-size: 0.85rem;
            color: #888;
            text-align: right;
            flex-shrink: 0;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .type-summary { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 8px 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>YouTube チャンネル動画タイプ別分析</h1>
            <p class="subtitle">チャンネルURLを入力するだけで、ショート動画と長尺動画の再生回数を分けて表示</p>
            <a href="/" class="nav-link">← TikTok分析ツールへ</a>
        </header>

        <!-- 入力フォーム -->
        <section id="inputSection">
            <div class="form-card">
                <div class="form-group">
                    <label for="channelUrl">YouTubeチャンネルURL</label>
                    <input
                        type="text"
                        id="channelUrl"
                        placeholder="https://www.youtube.com/@channelname"
                        autocomplete="off"
                    >
                </div>
                <button class="btn-primary" id="analyzeBtn" onclick="startAnalysis()">
                    分析開始
                </button>
            </div>
        </section>

        <!-- プログレス -->
        <section class="progress-section" id="progressSection">
            <div class="spinner"></div>
            <p class="progress-message" id="progressMessage">分析を開始しています...</p>
        </section>

        <!-- エラー -->
        <div class="error-message" id="errorMessage"></div>

        <!-- 結果 -->
        <section class="results-section" id="resultsSection">
            <!-- チャンネル概要 -->
            <div class="channel-overview">
                <div class="channel-name" id="channelName"></div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="subscriberCount">-</div>
                        <div class="stat-label">登録者数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value blue" id="totalVideos">-</div>
                        <div class="stat-label">総動画数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value green" id="firstUpload">-</div>
                        <div class="stat-label">初投稿日</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value orange" id="totalViews">-</div>
                        <div class="stat-label">総再生回数</div>
                    </div>
                </div>
            </div>

            <!-- ショート vs 長尺 -->
            <div class="type-summary">
                <div class="type-card">
                    <h3><span class="badge badge-short">SHORT</span> ショート動画</h3>
                    <div class="type-stat">
                        <span class="type-stat-label">動画数</span>
                        <span class="type-stat-value" id="shortCount">-</span>
                    </div>
                    <div class="type-stat">
                        <span class="type-stat-label">総再生回数</span>
                        <span class="type-stat-value" id="shortViews">-</span>
                    </div>
                    <div class="type-stat">
                        <span class="type-stat-label">平均再生回数</span>
                        <span class="type-stat-value" id="shortAvgViews">-</span>
                    </div>
                </div>
                <div class="type-card">
                    <h3><span class="badge badge-long">LONG</span> 長尺動画</h3>
                    <div class="type-stat">
                        <span class="type-stat-label">動画数</span>
                        <span class="type-stat-value" id="longCount">-</span>
                    </div>
                    <div class="type-stat">
                        <span class="type-stat-label">総再生回数</span>
                        <span class="type-stat-value" id="longViews">-</span>
                    </div>
                    <div class="type-stat">
                        <span class="type-stat-label">平均再生回数</span>
                        <span class="type-stat-value" id="longAvgViews">-</span>
                    </div>
                </div>
            </div>

            <!-- 月間再生回数グラフ -->
            <div class="chart-section">
                <h3>月間再生回数（ショート vs 長尺）</h3>
                <div style="display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.85rem;">
                    <span><span style="color:#ff4444;">■</span> ショート</span>
                    <span><span style="color:#3ea6ff;">■</span> 長尺</span>
                </div>
                <div class="bar-chart" id="viewsChart"></div>
            </div>

            <!-- 月間テーブル -->
            <div class="monthly-section">
                <h3>月間データ一覧</h3>
                <table>
                    <thead>
                        <tr>
                            <th>月</th>
                            <th>ショート再生数</th>
                            <th>長尺再生数</th>
                            <th>合計再生数</th>
                            <th>ショート本数</th>
                            <th>長尺本数</th>
                            <th>合計本数</th>
                        </tr>
                    </thead>
                    <tbody id="monthlyTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function formatNumber(n) {
            if (n >= 100_000_000) return (n / 100_000_000).toFixed(1) + '億';
            if (n >= 10_000) return (n / 10_000).toFixed(1) + '万';
            return n.toLocaleString();
        }

        function formatNumberFull(n) {
            return n.toLocaleString();
        }

        let pollTimer = null;

        async function startAnalysis() {
            const url = document.getElementById('channelUrl').value.trim();
            if (!url) {
                alert('チャンネルURLを入力してください');
                return;
            }

            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            try {
                const res = await fetch('/api/youtube/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_url: url }),
                });
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                pollTimer = setInterval(() => pollStatus(data.job_id), 2000);
            } catch (e) {
                showError('サーバーに接続できませんでした。');
            }
        }

        async function pollStatus(jobId) {
            try {
                const res = await fetch(`/api/youtube/status/${jobId}`);
                const data = await res.json();

                document.getElementById('progressMessage').textContent = data.message || '処理中...';

                if (data.status === 'completed') {
                    clearInterval(pollTimer);
                    showResults(data.result);
                } else if (data.status === 'error') {
                    clearInterval(pollTimer);
                    showError(data.message);
                }
            } catch (e) {
                clearInterval(pollTimer);
                showError('接続エラーが発生しました。');
            }
        }

        function showError(msg) {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = false;
        }

        function showResults(result) {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            // チャンネル概要
            document.getElementById('channelName').textContent = result.channel_name;
            document.getElementById('subscriberCount').textContent = formatNumber(result.subscriber_count);
            document.getElementById('totalVideos').textContent = formatNumber(result.total_videos);
            document.getElementById('firstUpload').textContent = result.first_upload_date;
            document.getElementById('totalViews').textContent = formatNumber(result.total_views);

            // ショート集計
            document.getElementById('shortCount').textContent = formatNumberFull(result.total_short_count);
            document.getElementById('shortViews').textContent = formatNumber(result.total_short_views);
            document.getElementById('shortAvgViews').textContent =
                result.total_short_count > 0
                    ? formatNumber(Math.round(result.total_short_views / result.total_short_count))
                    : '-';

            // 長尺集計
            document.getElementById('longCount').textContent = formatNumberFull(result.total_long_count);
            document.getElementById('longViews').textContent = formatNumber(result.total_long_views);
            document.getElementById('longAvgViews').textContent =
                result.total_long_count > 0
                    ? formatNumber(Math.round(result.total_long_views / result.total_long_count))
                    : '-';

            // グラフ描画
            renderChart(result.monthly);

            // テーブル描画
            renderTable(result.monthly);
        }

        function renderChart(monthly) {
            const chart = document.getElementById('viewsChart');
            chart.innerHTML = '';

            // 最新12ヶ月を表示（古い順に）
            const months = monthly.slice(0, 12).reverse();
            const maxViews = Math.max(...months.map(m => m.total_views), 1);

            months.forEach(m => {
                const shortPct = (m.short_views / maxViews) * 100;
                const longPct = (m.long_views / maxViews) * 100;

                const row = document.createElement('div');
                row.className = 'bar-row';
                row.innerHTML = `
                    <div class="bar-label">${m.month}</div>
                    <div class="bar-container">
                        <div class="bar-short" style="width:${shortPct}%" title="ショート: ${formatNumberFull(m.short_views)}回"></div>
                        <div class="bar-long" style="width:${longPct}%" title="長尺: ${formatNumberFull(m.long_views)}回"></div>
                    </div>
                    <div class="bar-total">${formatNumber(m.total_views)}</div>
                `;
                chart.appendChild(row);
            });
        }

        function renderTable(monthly) {
            const tbody = document.getElementById('monthlyTableBody');
            tbody.innerHTML = '';

            monthly.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${m.month}</td>
                    <td class="views-short">${formatNumberFull(m.short_views)}</td>
                    <td class="views-long">${formatNumberFull(m.long_views)}</td>
                    <td>${formatNumberFull(m.total_views)}</td>
                    <td class="count-short">${m.short_count}</td>
                    <td class="count-long">${m.long_count}</td>
                    <td>${m.total_count}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Enterキーで分析開始
        document.getElementById('channelUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startAnalysis();
        });
    </script>
</body>
</html>
