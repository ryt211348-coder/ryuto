<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美容動画リサーチツール</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/planner.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>美容動画リサーチツール</h1>
            <p class="subtitle">TikTok・Instagramのバズ美容動画を自動収集 → 再生数順にランキング表示</p>
        </header>

        <!-- プラットフォーム切り替え -->
        <div class="platform-tabs">
            <button class="platform-tab active" id="tab-tiktok" onclick="switchPlatform('tiktok')">TikTok</button>
            <button class="platform-tab" id="tab-instagram" onclick="switchPlatform('instagram')">Instagram</button>
        </div>

        <!-- フィルター -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>期間</label>
                <select id="periodFilter" onchange="applyFilters()">
                    <option value="7">直近1週間</option>
                    <option value="30" selected>直近1ヶ月</option>
                    <option value="90">直近3ヶ月</option>
                    <option value="180">直近6ヶ月</option>
                    <option value="365">直近1年</option>
                    <option value="9999">1年以上前</option>
                </select>
            </div>
            <div class="filter-group">
                <label>最低再生数</label>
                <select id="minViewsFilter" onchange="applyFilters()">
                    <option value="0">指定なし</option>
                    <option value="10000">1万再生以上</option>
                    <option value="100000">10万再生以上</option>
                    <option value="500000" selected>50万再生以上</option>
                    <option value="1000000">100万再生以上</option>
                </select>
            </div>
            <div class="filter-group">
                <label>表示件数</label>
                <select id="limitFilter" onchange="applyFilters()">
                    <option value="50">50件</option>
                    <option value="100">100件</option>
                    <option value="200">200件</option>
                    <option value="500" selected>500件</option>
                </select>
            </div>
            <button class="btn-primary" id="searchBtn" onclick="startSearch()" style="padding:.6rem 1.5rem;width:auto">
                検索開始
            </button>
        </div>

        <!-- ステータス -->
        <div class="search-status hidden" id="searchStatus">
            <div class="spinner" style="width:24px;height:24px;border-width:2px"></div>
            <span id="searchMessage">検索中...</span>
        </div>

        <!-- 結果サマリー -->
        <div class="result-summary hidden" id="resultSummary"></div>

        <!-- 動画リスト -->
        <div id="videoList"></div>

        <!-- アカウント詳細モーダル -->
        <div class="modal-overlay hidden" id="accountModal" onclick="closeModal(event)">
            <div class="modal-card modal-wide" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div id="accountContent">
                    <div class="spinner" style="margin:2rem auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/planner.js"></script>
</body>
</html>
